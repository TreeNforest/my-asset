name: 更新台股報價

on:
  schedule:
    # 台灣時間週一～週五 14:30 與 16:00 各跑一次（收盤後，UTC 06:30 / 08:00）
    # 跑兩次是保險：萬一第一次資料還沒出來，第二次會補上
    - cron: '30 6 * * 1-5'
    - cron: '0 8 * * 1-5'
  workflow_dispatch:        # 也可在 Actions 頁面手動執行

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 抓取股價
        run: |
          python3 - <<'PY'
          import json, urllib.request, datetime, os, time

          # ⬇️ 想追蹤的股票代號寫這裡
          CODES = ["0050", "2330"]

          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"}

          def get(url):
              req = urllib.request.Request(url, headers=UA)
              return json.load(urllib.request.urlopen(req, timeout=30))

          prices = {}      # code -> price
          trade_date = ""  # YYYY-MM-DD，實際交易日

          # ── 來源 A：證交所即時報價（收盤後立刻有值，且回傳含交易日期）──
          for prefix in ("tse", "otc"):
              missing = [c for c in CODES if c not in prices]
              if not missing:
                  break
              try:
                  ex = "|".join(f"{prefix}_{c}.tw" for c in missing)
                  data = get("https://mis.twse.com.tw/stock/api/getStockInfo.jsp"
                             f"?json=1&delay=0&ex_ch={ex}")
                  for m in data.get("msgArray", []):
                      code = str(m.get("c", "")).strip()
                      # z=成交價；收盤後若無成交退回 y=昨收
                      for key in ("z", "y", "o"):
                          raw = str(m.get(key, "")).replace(",", "").strip()
                          try:
                              p = float(raw)
                          except ValueError:
                              continue
                          if p > 0:
                              prices[code] = p
                              d = str(m.get("d", "")).strip()   # 20260720
                              if len(d) == 8 and d > trade_date.replace("-", ""):
                                  trade_date = f"{d[0:4]}-{d[4:6]}-{d[6:8]}"
                              break
                  print(f"來源 A({prefix}) 後:", prices, trade_date)
                  time.sleep(2)   # 尊重對方的頻率限制
              except Exception as e:
                  print(f"來源 A({prefix}) 失敗:", e)

          # ── 來源 B：證交所每日收盤行情（備援，僅上市；資料有時較晚才更新）──
          missing = [c for c in CODES if c not in prices]
          if missing:
              try:
                  rows = get("https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL")
                  for r in rows:
                      code = str(r.get("Code", "")).strip()
                      if code in missing:
                          raw = str(r.get("ClosingPrice", "")).replace(",", "").strip()
                          try:
                              p = float(raw)
                              if p > 0:
                                  prices[code] = p
                          except ValueError:
                              pass
                  print("來源 B 後:", prices)
              except Exception as e:
                  print("來源 B 失敗:", e)

          if not prices:
              print("⚠️ 完全沒抓到，保留原本的 prices.json")
              raise SystemExit(0)

          # 保留舊資料中這次沒抓到的代號，避免被清掉
          if os.path.exists("prices.json"):
              try:
                  old = json.load(open("prices.json", encoding="utf-8"))
                  for k, v in (old.get("prices") or {}).items():
                      prices.setdefault(k, v)
                  if not trade_date:
                      trade_date = old.get("tradeDate", "")
              except Exception:
                  pass

          out = {
              "tradeDate": trade_date,     # 真正的交易日
              "updatedAt": datetime.datetime.utcnow().isoformat() + "Z",
              "prices": prices,
          }
          with open("prices.json", "w", encoding="utf-8") as f:
              json.dump(out, f, ensure_ascii=False, indent=2)
          print("已寫入:", out)
          PY

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: 更新股價 $(date -u +%Y-%m-%d)"
          git push
