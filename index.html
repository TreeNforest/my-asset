<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<script>
  window.addEventListener('error', function(e){
    showErrBox((e.error && (e.error.stack||e.error.message)) || e.message || String(e));
  });
  window.addEventListener('unhandledrejection', function(e){
    var r = e.reason;
    showErrBox('Promise rejection: ' + ((r && (r.stack||r.message)) || String(r)));
  });
  function showErrBox(text){
    var el = document.getElementById('err-box');
    if(!el){
      el = document.createElement('div');
      el.id = 'err-box';
      el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#B5615B;color:#fff;padding:14px;font-size:13px;z-index:99999;white-space:pre-wrap;max-height:70vh;overflow:auto;font-family:monospace;';
      document.body.appendChild(el);
    }
    var line = document.createElement('div');
    line.style.marginBottom = '10px';
    line.textContent = text;
    el.appendChild(line);
  }
</script>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>我的資產</title>
<link rel="icon" href="./favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#F2EFEA">
<style>
  :root{
    --bg:#F2EFEA;
    --surface:#FFFFFF;
    --ink:#3D3833;
    --ink-soft:#8C8579;
    --line:#E4DED4;
    --income:#16A34A;
    --income-soft:#DCFCE7;
    --expense:#DC2626;
    --expense-soft:#FEE2E2;
    --accent:#C9B38B;
    --warn:#B5615B;
    --radius:16px;
    --solid:#3D3833;
    --field-bg:#FAF8F4;
    --ghost-bg:#EFEAE2;
  }
  html.dark{
    --bg:#1C1A17;
    --surface:#262320;
    --ink:#EDE8E0;
    --ink-soft:#A89F92;
    --line:#3A352F;
    --income:#22C55E;
    --income-soft:#15301F;
    --expense:#EF4444;
    --expense-soft:#3A1B1B;
    --accent:#D4BC95;
    --warn:#E5736B;
    --field-bg:#2E2A25;
    --ghost-bg:#332E28;
  }
  html.dark body{background:var(--bg);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  @font-face{font-family:'CreamFont';src:url('./creamfont-3.3.otf') format('opentype');font-display:swap;font-style:normal;font-weight:normal;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:'CreamFont',-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    font-style:normal;
    -webkit-font-smoothing:antialiased;}
  button{font-family:inherit;}
  #root{min-height:100vh;padding-bottom:90px;}

  .header{position:sticky;top:0;z-index:10;background:var(--bg);padding:18px 18px 8px;
    display:flex;align-items:center;justify-content:space-between;}
  .header h1{margin:0;font-size:21px;letter-spacing:.06em;font-weight:600;}
  .theme-toggle{background:var(--surface);border:1px solid var(--line);border-radius:50%;
    width:36px;height:36px;font-size:17px;flex-shrink:0;box-shadow:0 1px 3px rgba(60,50,40,.06);}

  .month-switcher{display:flex;align-items:center;justify-content:center;gap:18px;
    padding:6px 18px 14px;}
  .month-switcher button{background:none;border:none;font-size:19px;color:var(--ink-soft);
    width:32px;height:32px;border-radius:50%;}
  .month-switcher button:active{background:var(--line);}
  .month-switcher .label{font-size:17px;font-weight:600;min-width:110px;text-align:center;}
  .month-switcher .label-btn{font-size:17px;font-weight:600;min-width:110px;text-align:center;
    width:auto;height:auto;border-radius:8px;padding:4px 10px;color:var(--ink);}
  .year-switcher{display:flex;align-items:center;justify-content:center;gap:18px;padding:6px 18px 2px;}
  .year-switcher button{background:none;border:none;font-size:19px;color:var(--ink-soft);
    width:32px;height:32px;border-radius:50%;}
  .year-switcher .label{font-size:17px;font-weight:600;min-width:80px;text-align:center;}
  .month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px;}
  .month-grid-btn{padding:14px 0;border-radius:10px;border:1px solid var(--line);
    background:var(--field-bg);color:var(--ink);font-weight:600;font-size:14px;}
  .month-grid-btn.active{background:var(--solid);color:#fff;border-color:var(--solid);}
  .range-mode-row{display:flex;justify-content:center;padding:0 18px 6px;}
  .range-mode-link{background:none;border:none;color:var(--accent);font-size:12px;font-weight:700;
    text-decoration:underline;}
  .date-range-row{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 18px 14px;flex-wrap:wrap;}
  .date-range-row input{border:1px solid var(--line);border-radius:8px;padding:7px 8px;
    font-size:13px;background:var(--field-bg);color:var(--ink);}

  .content{padding:0 18px 18px;}

  .summary-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
  .summary-card{background:var(--surface);border-radius:var(--radius);padding:12px 10px;text-align:center;
    box-shadow:0 1px 3px rgba(60,50,40,.06);}
  .summary-card .label{font-size:12px;color:var(--ink-soft);margin-bottom:4px;}
  .summary-card .value{font-size:16px;font-weight:700;}
  .summary-card.income .value{color:var(--income);}
  .summary-card.expense .value{color:var(--expense);}

  .section-title{font-size:14px;color:var(--ink-soft);margin:18px 0 8px;font-weight:600;
    display:flex;align-items:center;justify-content:space-between;}
  .section-title a{font-size:13px;color:var(--accent);font-weight:500;}

  .budget-row{background:var(--surface);border-radius:12px;padding:10px 14px;margin-bottom:8px;
    box-shadow:0 1px 3px rgba(60,50,40,.05);}
  .budget-row .top{display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px;}
  .budget-row .top .name{font-weight:600;}
  .budget-row .top .nums{color:var(--ink-soft);}
  .budget-row .top .nums.over{color:var(--warn);font-weight:700;}
  .budget-bar{height:6px;border-radius:4px;background:var(--line);overflow:hidden;}
  .budget-bar .fill{height:100%;border-radius:4px;background:var(--income);}
  .budget-bar .fill.warn{background:var(--accent);}
  .budget-bar .fill.over{background:var(--warn);}

  .tx-item{background:var(--surface);border-radius:12px;padding:12px 14px;margin-bottom:8px;
    display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(60,50,40,.05);}
  .tx-item .icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-size:18px;flex-shrink:0;}
  .tx-item .mid{flex:1;min-width:0;}
  .tx-item .mid .cat{font-size:15px;font-weight:600;}
  .tx-item .mid .note{font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tx-item .amt{font-size:16px;font-weight:700;flex-shrink:0;}
  .tx-item .amt.income{color:var(--income);}
  .tx-item .amt.expense{color:var(--expense);}
  .tx-item .amt.transfer{color:var(--ink-soft);}
  .tx-item .icon.transfer-icon{background:var(--line);}
  .action-row{display:flex;justify-content:space-around;padding:6px 0 4px;}
  .action-btn{display:flex;flex-direction:column;align-items:center;gap:8px;background:none;border:none;
    font-size:14px;color:var(--ink);}
  .action-btn .ic{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:23px;color:#fff;}
  .action-btn.transfer .ic{background:#3B82F6;}
  .action-btn.expense .ic{background:var(--expense);}
  .action-btn.income .ic{background:var(--income);}
  .empty-hint{text-align:center;color:var(--ink-soft);font-size:14px;padding:30px 0;}
  .search-bar-wrap{position:relative;margin-bottom:14px;}
  .search-bar-wrap input{width:100%;padding:10px 36px 10px 36px;border:1px solid var(--line);
    border-radius:10px;background:var(--field-bg);color:var(--ink);font-size:14px;}
  .search-bar-wrap .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);
    font-size:15px;color:var(--ink-soft);pointer-events:none;}
  .search-bar-wrap .search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);
    background:none;border:none;font-size:15px;color:var(--ink-soft);padding:4px;}
  .day-group-header{font-size:13px;color:var(--ink-soft);font-weight:600;margin:14px 0 6px;}

  .bottom-nav{position:fixed;left:0;right:0;bottom:0;background:var(--surface);
    display:flex;border-top:1px solid var(--line);padding:6px 0 max(6px,env(safe-area-inset-bottom));z-index:20;}
  .bottom-nav button{flex:1;background:none;border:none;display:flex;flex-direction:column;
    align-items:center;gap:2px;padding:6px 0;color:var(--ink-soft);font-size:12px;}
  .bottom-nav button .ic{font-size:20px;}
  .bottom-nav button.active{color:var(--expense);font-weight:600;}

  .fab{position:fixed;right:18px;bottom:78px;width:54px;height:54px;border-radius:50%;
    background:var(--expense);color:#fff;border:none;font-size:27px;box-shadow:0 4px 10px rgba(60,50,40,.25);
    z-index:21;line-height:54px;}

  .sheet-overlay{position:fixed;inset:0;background:rgba(60,50,40,.35);z-index:30;display:flex;
    align-items:flex-end;}
  .sheet{background:var(--surface);width:100%;border-radius:20px 20px 0 0;padding:18px 18px max(18px,env(safe-area-inset-bottom));
    max-height:85vh;overflow-y:auto;}
  .sheet-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 14px;}
  .sheet h2{margin:0 0 16px;font-size:18px;}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;color:var(--ink-soft);margin-bottom:6px;}
  .field input, .field select, .field textarea{width:100%;border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;font-size:16px;background:var(--field-bg);color:var(--ink);}
  .field textarea{resize:none;}
  .calc-input{background:var(--field-bg);border:1px solid var(--line);border-radius:12px;padding:10px;}
  .calc-display{text-align:right;padding:4px 6px 10px;}
  .calc-display .calc-expr{font-size:13px;color:var(--ink-soft);min-height:17px;word-break:break-all;}
  .calc-display .calc-result{font-size:26px;font-weight:700;margin-top:2px;}
  .calc-keys{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  .calc-key{padding:13px 0;border-radius:10px;border:none;background:var(--surface);color:var(--ink);
    font-size:17px;font-weight:600;}
  .calc-key.op{background:var(--ghost-bg);color:var(--ink-soft);}
  .calc-key.eq{background:var(--solid);color:#fff;}
  .calc-key.wide{grid-column:span 2;}
  .type-toggle{display:flex;gap:8px;margin-bottom:14px;}
  .type-toggle button{flex:1;padding:10px;border-radius:10px;border:1px solid var(--line);background:var(--field-bg);
    font-size:15px;color:var(--ink-soft);font-weight:600;}
  .type-toggle button.active.expense{background:var(--expense-soft);color:var(--expense);border-color:var(--expense);}
  .type-toggle button.active.income{background:var(--income-soft);color:var(--income);border-color:var(--income);}
  .btn-row{display:flex;gap:10px;margin-top:6px;}
  .btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:16px;font-weight:600;}
  .btn.primary{background:var(--solid);color:#fff;}
  .btn.ghost{background:var(--ghost-bg);color:var(--ink-soft);}
  .btn.danger{background:var(--warn);color:#fff;}
  .btn.accent{background:var(--accent);color:#fff;}
  .btn-row.pill .btn{border-radius:999px;}
  .detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .detail-header .detail-title{margin:0;font-size:17px;font-weight:700;}
  .detail-close-x{background:none;border:none;font-size:17px;color:var(--ink-soft);padding:4px 6px;}

  .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-dow{text-align:center;font-size:12px;color:var(--ink-soft);padding-bottom:6px;}
  .cal-cell{min-height:62px;border-radius:10px;background:var(--surface);display:flex;flex-direction:column;
    align-items:center;font-size:14px;gap:1px;position:relative;padding-top:6px;}
  .cal-cell.empty{background:transparent;}
  .cal-cell.today{box-shadow:inset 0 0 0 2px var(--accent);}
  .cal-day-num{line-height:1.2;}
  .cal-num{font-size:10.5px;line-height:1.3;font-weight:600;}
  .cal-num.income{color:var(--income);}
  .cal-num.expense{color:var(--expense);}

  .chart-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:14px;
    box-shadow:0 1px 3px rgba(60,50,40,.06);}
  .chart-card h3{margin:0 0 12px;font-size:14px;color:var(--ink-soft);font-weight:600;}
  .chart-scroll-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .chart-axis-wrap{position:relative;height:180px;padding-left:52px;}
  .chart-axis-wrap .axis-label{position:absolute;left:0;font-size:10px;color:var(--ink-soft);white-space:nowrap;width:50px;text-align:right;}
  .chart-axis-wrap .gridline{position:absolute;left:52px;right:0;border-top:1px dashed var(--line);height:0;}
  .barchart{position:relative;display:flex;align-items:flex-end;gap:3px;height:100%;}
  .bar-col{flex:0 0 auto;width:18px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;cursor:pointer;}
  .bar-col .bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;opacity:.85;}
  .bar-col .bar.picked{opacity:1;outline:2px solid var(--accent);outline-offset:1px;}
  .bar-labels-row{display:flex;gap:3px;padding-left:52px;}
  .bar-labels-row .bar-label{flex:0 0 auto;width:18px;text-align:center;font-size:9px;color:var(--ink-soft);}
  .bar-labels-row .bar-label.picked{color:var(--ink);font-weight:700;}
  .grouped-bars{display:flex;gap:2px;align-items:flex-end;height:100%;}
  .grouped-col{flex:0 0 auto;width:22px;display:flex;align-items:flex-end;justify-content:center;gap:2px;height:100%;cursor:pointer;}
  .grouped-bars-inner{display:flex;gap:2px;align-items:flex-end;height:100%;}
  .grouped-bars .bar{width:8px;border-radius:3px 3px 0 0;min-height:2px;opacity:.85;}
  .grouped-bars .bar.income{background:var(--income);}
  .grouped-bars .bar.expense{background:var(--expense);}
  .grouped-col.picked .bar{opacity:1;}
  .chart-detail{margin-top:12px;padding-top:10px;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;font-size:13px;}
  .chart-detail .lbl{color:var(--ink-soft);font-weight:600;}
  .chart-hint{font-size:12px;color:var(--ink-soft);text-align:center;margin-top:10px;}
  .donut-wrap{display:flex;align-items:center;gap:18px;}
  .donut-legend{flex:1;display:flex;flex-direction:column;gap:6px;}
  .legend-row{display:flex;align-items:center;gap:8px;font-size:13px;}
  .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .legend-row .name{flex:1;color:var(--ink);}
  .legend-row .val{color:var(--ink-soft);}
  .mode-toggle{display:flex;gap:8px;margin:0 18px 12px;}
  .mode-toggle button{flex:1;padding:8px;border-radius:10px;border:1px solid var(--line);background:var(--surface);
    font-size:14px;color:var(--ink-soft);font-weight:600;}
  .mode-toggle button.active{background:var(--solid);color:#fff;border-color:var(--solid);}

  .cat-section{margin-bottom:20px;}
  .cat-section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .cat-section-title h3{margin:0;font-size:15px;}
  .cat-section-title button{background:var(--accent);color:#fff;border:none;border-radius:8px;
    padding:6px 10px;font-size:13px;font-weight:600;}
  .cat-node{margin-bottom:6px;}
  .cat-row{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:10px;
    padding:9px 10px;box-shadow:0 1px 2px rgba(60,50,40,.05);}
  .cat-row .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .cat-row .name{flex:1;font-size:14px;font-weight:600;}
  .cat-row .budget-tag{font-size:12px;color:var(--ink-soft);}
  .cat-row .icon-btn{background:none;border:none;font-size:15px;color:var(--ink-soft);padding:4px;}
  .cat-row .more-btn{font-size:19px;font-weight:700;padding:4px 8px;}
  .action-list{display:flex;flex-direction:column;gap:8px;margin:12px 0;}
  .action-list-item{width:100%;text-align:left;padding:13px 14px;border-radius:10px;border:none;
    background:var(--field-bg);color:var(--ink);font-size:14px;font-weight:600;}
  .action-list-item.danger{color:var(--warn);}
  .cat-row .drag-handle{font-size:16px;color:var(--ink-soft);padding:4px 2px;touch-action:none;cursor:grab;}
  .cat-children{margin-left:22px;margin-top:6px;border-left:1px dashed var(--line);padding-left:10px;}

  .settings-mode-toggle{display:flex;gap:8px;margin-bottom:16px;}
  .settings-mode-toggle button{flex:1;padding:9px;border-radius:10px;border:1px solid var(--line);background:var(--surface);
    font-size:14px;color:var(--ink-soft);font-weight:600;}
  .settings-mode-toggle button.active{background:var(--solid);color:#fff;border-color:var(--solid);}

  .networth-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:18px;
    box-shadow:0 1px 3px rgba(60,50,40,.06);}
  .networth-card .nw-top{display:flex;justify-content:space-between;align-items:center;}
  .networth-card .nw-mask-btn{background:none;border:none;font-size:16px;padding:2px 4px;color:var(--ink-soft);}
  .networth-card .nw-label{font-size:13px;color:var(--ink-soft);}
  .networth-card .nw-value{font-size:25px;font-weight:700;margin:4px 0 12px;}
  .networth-card .nw-split{display:flex;gap:16px;font-size:13px;color:var(--ink-soft);}
  .networth-card .nw-split b{color:var(--ink);font-weight:700;}

  .acc-section{margin-bottom:20px;}
  .acc-section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .acc-section-title h3{margin:0;font-size:15px;}
  .acc-section-title button{background:var(--accent);color:#fff;border:none;border-radius:8px;
    padding:6px 10px;font-size:13px;font-weight:600;}
  .acc-row{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:10px;
    padding:9px 10px;margin-bottom:6px;box-shadow:0 1px 2px rgba(60,50,40,.05);}
  .acc-row-main{display:flex;align-items:center;gap:10px;flex:1;min-width:0;cursor:pointer;}
  .acc-icon{width:34px;height:34px;border-radius:50%;background:var(--bg);display:flex;align-items:center;
    justify-content:center;font-size:17px;flex-shrink:0;overflow:hidden;}
  .acc-icon.card-shape{width:46px;height:30px;border-radius:5px;}
  .acc-row .name{flex:1;font-size:14px;font-weight:600;min-width:0;}
  .acc-name-wrap{flex:1;min-width:0;display:flex;flex-direction:column;}
  .acc-sub{font-size:12px;color:var(--ink-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .acc-row .bal{font-size:13px;color:var(--ink-soft);white-space:nowrap;}
  .acc-detail-balance{text-align:center;padding:6px 0 14px;}
  .acc-detail-balance .nw-value{font-size:26px;font-weight:700;margin-top:4px;}
  .acc-detail-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .acc-detail-stats .stat{background:var(--field-bg);border-radius:10px;padding:10px;text-align:center;}
  .acc-detail-stats .stat span{display:block;font-size:11px;color:var(--ink-soft);margin-bottom:3px;}
  .acc-detail-stats .stat b{font-size:14px;}
  .acc-detail-stats .stat b.pos{color:var(--income);}
  .acc-detail-stats .stat b.neg{color:var(--expense);}
  .acc-detail-year-row{display:flex;justify-content:flex-end;margin-bottom:10px;}
  .acc-detail-year-row select{border:1px solid var(--line);border-radius:8px;padding:6px 8px;
    font-size:13px;background:var(--field-bg);color:var(--ink);}
  .img-lib{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .img-lib-item{position:relative;width:44px;height:44px;border-radius:8px;overflow:hidden;
    cursor:pointer;border:2px solid transparent;flex-shrink:0;}
  .img-lib-item.active{border-color:var(--accent);}
  .img-lib-item img{width:100%;height:100%;object-fit:cover;}
  .img-lib-del{position:absolute;top:1px;right:1px;width:15px;height:15px;border-radius:50%;

function pad(n){return n<10?"0"+n:""+n;}
function toDateStr(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function fromDateStr(s){const p=s.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}
function monthKey(d){return d.getFullYear()+"-"+pad(d.getMonth()+1);}
function fmtMoney(n){return ""+Math.round(n||0).toLocaleString("zh-Hant-TW");}
function maskMoney(n, masked){ return masked ? "••••••" : fmtMoney(n); }
function safeEval(expr){
  if(!expr) return 0;
  let s = String(expr).trim().replace(/[+\-*/.]+$/, "");
  if(!s) return 0;
  if(!/^[0-9+\-*/.\s]+$/.test(s)) return 0;
  try{
    const val = Function('"use strict";return ('+s+')')();
    return (typeof val==="number" && isFinite(val)) ? val : 0;
  }catch(e){ return 0; }
}
function fmtAxisNum(n){

function niceMax(rawMax){
  if(rawMax<=0) return 1000;
  const steps = [100,200,500,1000,2000,5000,10000,20000,50000,100000,200000,500000];
  for(const s of steps){
    const ceil = Math.ceil(rawMax/s)*s;
    if(ceil>=rawMax) return ceil;
  }
  return Math.ceil(rawMax/100000)*100000;
}
function niceGridlines(max, count){
  // 傳回 count 條格線的值（從0往上，不含0和max）
  const out = [];
  for(let i=1;i<count;i++) out.push(max/count*i);
  return out;
}

function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}

const WEEKDAY_CN = ["日","一","二","三","四","五","六"];
function formatDayLabel(dateStr){
  const d = fromDateStr(dateStr);
  const today = toDateStr(new Date());
  const yest = new Date(); yest.setDate(yest.getDate()-1);
  if(dateStr===today) return "今天";
  if(dateStr===toDateStr(yest)) return "昨天";
  return (d.getMonth()+1)+"月"+d.getDate()+"日 週"+WEEKDAY_CN[d.getDay()];
}
function groupByDate(transactions){
  const map = {};
  transactions.forEach(t=>{
    if(!map[t.date]) map[t.date] = [];
    map[t.date].push(t);
  });
  return Object.keys(map).sort((a,b)=>b.localeCompare(a)).map(date=>({
    date,
    items: map[date].slice().sort((a,b)=>(a.createdAt||0)-(b.createdAt||0))
  }));
}

];
function accTypeInfo(key){return ACCOUNT_TYPES.find(t=>t.key===key) || ACCOUNT_TYPES[0];}
function isLiability(type){return type==="credit";}
function monthlyInterest(acc){
  if(acc.type!=="fixed" || !acc.rate) return 0;
  return (acc.initialBalance||0) * (acc.rate/100) / 12;
}
function addMonthsClamped(date, months){
  const d = new Date(date.getFullYear(), date.getMonth()+months, 1);
  const lastDay = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  d.setDate(Math.min(date.getDate(), lastDay));
  return d;
}
function dueInterestDates(acc, today){
  if(!acc.startDate || !acc.endDate || !acc.rate) return [];
  const start = fromDateStr(acc.startDate);
  const end = fromDateStr(acc.endDate);
  const dates = [];
  let i = 1;
  while(i<=600){
    const d = addMonthsClamped(start, i);
    if(d.getTime()>end.getTime() || d.getTime()>today.getTime()) break;
    dates.push(toDateStr(d));
    i++;
  }
  return dates;
}

function accountBalance(acc, transactions){
  let bal = acc.initialBalance || 0;
  transactions.forEach(t=>{
    if(t.type==="transfer"){
      const leaving = t.fromAccountId===acc.id;
      const arriving = t.toAccountId===acc.id;
      if(!leaving && !arriving) return;
      if(isLiability(acc.type)){
        if(leaving) bal += t.amount;
        if(arriving) bal -= t.amount;
      }else{
        if(leaving) bal -= t.amount;
        if(arriving) bal += t.amount;
      }
      return;
    }
    if(t.accountId !== acc.id) return;
    if(isLiability(acc.type)){
      if(t.type==="expense") bal += t.amount;
      else bal -= t.amount;
    }else{
      if(t.type==="income") bal += t.amount;
      else bal -= t.amount;
    }
  });
  return bal;
}

function invReturnPct(inv){

function fileToIconDataURL(file, width, height){
  width = width || 56;
  height = height || width;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        const targetRatio = width/height;
        const srcRatio = img.width/img.height;
        let sx, sy, sw, sh;
        if(srcRatio > targetRatio){
          sh = img.height; sw = sh*targetRatio;
          sx = (img.width-sw)/2; sy = 0;
        }else{
          sw = img.width; sh = sw/targetRatio;
          sx = 0; sy = (img.height-sh)/2;
        }
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, width, height);
        resolve(canvas.toDataURL("image/png"));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function buildTree(list){
  const map={};
  list.forEach(c=>map[c.id]={...c, children:[]});
  const roots=[];
  list.forEach(c=>{
    if(c.parentId && map[c.parentId]) map[c.parentId].children.push(map[c.id]);
    else roots.push(map[c.id]);
  });
  roots.sort((a,b)=>(a.order||0)-(b.order||0));
  Object.values(map).forEach(n=>n.children.sort((a,b)=>(a.order||0)-(b.order||0)));
  return roots;
}
function flattenForSelect(list, type){
  const roots=buildTree(list.filter(c=>c.type===type));
  const out=[];
  function walk(node, depth){
    if(node.children.length===0){
      out.push({id:node.id, label:"\u3000".repeat(depth)+(node.icon||"")+" "+node.name});
    }else{
      node.children.forEach(ch=>walk(ch, depth+1));
    }
  }
  roots.forEach(r=>walk(r,0));
  return out;
}
function categoryOptionGroups(categories, type){
  const roots = buildTree(categories.filter(c=>c.type===type));
  return roots.map(root=>{
    if(root.children.length===0){
      return <option key={root.id} value={root.id}>{root.icon} {root.name}</option>;
    }
    const leaves = [];
    function walk(node, depth){
      if(node.children.length===0){
        leaves.push({id:node.id, label:"\u3000".repeat(depth)+(node.icon||"")+" "+node.name});
      }else{
        node.children.forEach(ch=>walk(ch, depth+1));
      }
    }
    root.children.forEach(ch=>walk(ch,0));
    return (
      <optgroup key={root.id} label={root.icon+" "+root.name}>
        {leaves.map(l=><option key={l.id} value={l.id}>{l.label}</option>)}
      </optgroup>
    );
  });
}

function Donut({data, size}){
  size = size || 140;
  const thickness = 20;
  const total = data.reduce((s,d)=>s+d.value,0) || 1;
  const radius = (size-thickness)/2;
  const circumference = 2*Math.PI*radius;
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      <g transform={"translate("+size/2+","+size/2+") rotate(-90)"}>
        {data.map((d,i)=>{
          const frac = d.value/total;
          const dash = frac*circumference;
          const el = (
            <circle key={i} r={radius} fill="none" stroke={d.color} strokeWidth={thickness}
              strokeDasharray={dash+" "+(circumference-dash)} strokeDashoffset={-offset}></circle>
          );
          offset += dash;
          return el;
        })}
      </g>
      <text x="50%" y="50%" textAnchor="middle" dominantBaseline="middle" fontSize="13" fill="var(--ink)">支出</text>
    </svg>
  );
}

/* 通用拖曳排序清單：用 Pointer Events，手機/桌面都通用 */
function DragList({items, onReorder, renderRow}){
  const [list, setList] = useState(items);
  const [draggingId, setDraggingId] = useState(null);
  const [dragOffset, setDragOffset] = useState(0);
  const startYRef = useRef(0);
  const refs = useRef({});

  useEffect(()=>{ setList(items); }, [items.map(it=>it.id).join(",")]);

  function startDrag(id, e){
    e.preventDefault();
    try{ e.target.setPointerCapture(e.pointerId); }catch(err){}
    startYRef.current = e.clientY;
    setDraggingId(id);
    setDragOffset(0);
  }
  function onMove(e){
    if(draggingId==null) return;
    const dy = e.clientY - startYRef.current;
    setDragOffset(dy);
    const idx = list.findIndex(it=>it.id===draggingId);
    const el = refs.current[draggingId];
    if(!el || idx<0) return;
    const rect = el.getBoundingClientRect();
    const myCenter = rect.top + rect.height/2 + dy;
    let newIdx = idx;
    list.forEach((it,i)=>{
      if(it.id===draggingId) return;
      const r = refs.current[it.id];
      if(!r) return;
      const rr = r.getBoundingClientRect();
      const c = rr.top + rr.height/2;
      if(i<idx && myCenter < c) newIdx = Math.min(newIdx, i);
      if(i>idx && myCenter > c) newIdx = Math.max(newIdx, i);
    });
    if(newIdx!==idx){
      const next = list.slice();
      const moved = next.splice(idx,1)[0];
      next.splice(newIdx,0,moved);
      setList(next);
      startYRef.current = e.clientY;
      setDragOffset(0);
    }
  }
  function endDrag(){
    if(draggingId!=null) onReorder(list);
    setDraggingId(null);
    setDragOffset(0);
  }

  return (
    <div>
      {list.map(it=>(
        <div key={it.id} ref={el=>{refs.current[it.id]=el;}}
          style={it.id===draggingId ? {transform:"translateY("+dragOffset+"px)", position:"relative", zIndex:5} : {transition:"transform .15s"}}>
          {renderRow(it, {onPointerDown:(e)=>startDrag(it.id,e), onPointerMove:onMove, onPointerUp:endDrag, onPointerCancel:endDrag})}
        </div>
      ))}
    </div>
  );
}

function CalcInput({value, onChange}){
  const [expr, setExpr] = useState((value!=null && value!=="") ? String(value) : "");
  const result = safeEval(expr);

  useEffect(()=>{ onChange(result); }, [expr]);

  function press(key){
    if(key==="AC"){ setExpr(""); return; }
    if(key==="DEL"){ setExpr(s=>s.slice(0,-1)); return; }
    if(key==="="){ setExpr(s=>String(safeEval(s))); return; }
    if(key==="+"||key==="-"||key==="*"||key==="/"){
      setExpr(s=>{
        if(s==="") return s;
        if(/[+\-*/]$/.test(s)) return s.slice(0,-1)+key;
        return s+key;
      });
      return;
    }
    if(key==="."){
      setExpr(s=>{
        const lastSeg = s.split(/[+\-*/]/).pop();
        if(lastSeg.indexOf(".")>=0) return s;
        return s+key;
      });
      return;
    }
    setExpr(s=>s+key);
  }

  return (
    <div className="calc-input">
      <div className="calc-display">
        <div className="calc-expr">{expr||"0"}</div>
        <div className="calc-result">{fmtMoney(result)}</div>
      </div>
      <div className="calc-keys">
        <button type="button" className="calc-key op" onClick={()=>press("AC")}>AC</button>
        <button type="button" className="calc-key op" onClick={()=>press("DEL")}>⌫</button>
        <button type="button" className="calc-key op" onClick={()=>press("/")}>÷</button>
        <button type="button" className="calc-key op" onClick={()=>press("*")}>×</button>
        <button type="button" className="calc-key" onClick={()=>press("7")}>7</button>
        <button type="button" className="calc-key" onClick={()=>press("8")}>8</button>
        <button type="button" className="calc-key" onClick={()=>press("9")}>9</button>
        <button type="button" className="calc-key op" onClick={()=>press("-")}>−</button>
        <button type="button" className="calc-key" onClick={()=>press("4")}>4</button>
        <button type="button" className="calc-key" onClick={()=>press("5")}>5</button>
        <button type="button" className="calc-key" onClick={()=>press("6")}>6</button>
        <button type="button" className="calc-key op" onClick={()=>press("+")}>＋</button>
        <button type="button" className="calc-key" onClick={()=>press("1")}>1</button>
        <button type="button" className="calc-key" onClick={()=>press("2")}>2</button>
        <button type="button" className="calc-key" onClick={()=>press("3")}>3</button>
        <button type="button" className="calc-key eq" onClick={()=>press("=")}>＝</button>
        <button type="button" className="calc-key wide" onClick={()=>press("0")}>0</button>
        <button type="button" className="calc-key wide" onClick={()=>press(".")}>.</button>
      </div>
    </div>
  );
}

function OverviewTab({categories, accounts, monthTx, allTx, periodLabel, onViewTx, onAdd}){
  const label = periodLabel || "本月";
  const [query, setQuery] = useState("");
  const isSearching = query.trim().length > 0;

  const income = monthTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense = monthTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;

  const searchResults = useMemo(()=>{
    if(!isSearching) return [];
    const q = query.trim().toLowerCase();
    const pool = allTx || monthTx;
    return pool.filter(t=>{
      const cat = catById(categories, t.categoryId);
      const acc = t.type==="transfer"
        ? (catById(accounts, t.fromAccountId)||{name:""}).name + " " + (catById(accounts, t.toAccountId)||{name:""}).name
        : (catById(accounts, t.accountId)||{name:""}).name;
      const catName = cat ? cat.name : "";
      const note = t.note || "";
      const amt = String(Math.round(t.amount));
      return catName.toLowerCase().includes(q) || acc.toLowerCase().includes(q) ||
             note.toLowerCase().includes(q) || amt.includes(q) ||
             (t.counterpart||"").toLowerCase().includes(q);
    }).slice().sort((a,b)=>b.date.localeCompare(a.date)||(b.createdAt||0)-(a.createdAt||0));
  }, [query, allTx, monthTx, categories, accounts]);

  const dayGroups = useMemo(()=> isSearching ? [] : groupByDate(monthTx), [monthTx, isSearching]);
  const searchGroups = useMemo(()=> isSearching ? groupByDate(searchResults) : [], [searchResults, isSearching]);

  return (
    <div>
      <div className="summary-cards">
        <div className="summary-card income"><div className="label">{label}收入</div><div className="value">{fmtMoney(income)}</div></div>
        <div className="summary-card expense"><div className="label">{label}支出</div><div className="value">{fmtMoney(expense)}</div></div>
        <div className="summary-card"><div className="label">{label}結餘</div><div className="value">{fmtMoney(balance)}</div></div>
      </div>

      <div className="search-bar-wrap">
        <span className="search-icon">🔍</span>
        <input type="text" value={query} onChange={e=>setQuery(e.target.value)}
          placeholder="搜尋分類、帳戶、備註或金額…" />
        {query && <button className="search-clear" onClick={()=>setQuery("")}>✕</button>}
      </div>

      {isSearching ?
        <React.Fragment>
          <div className="section-title">搜尋結果（{searchResults.length} 筆）</div>
          {searchResults.length===0 && <div className="empty-hint">找不到符合的交易</div>}
          {searchGroups.map(g=>
            <React.Fragment key={g.date}>
              <div className="day-group-header">{formatDayLabel(g.date)}</div>
              {g.items.map(t=>
                <TxRow key={t.id} t={t} categories={categories} accounts={accounts} onClick={()=>onViewTx(t)} />
              )}
            </React.Fragment>
          )}
        </React.Fragment>
        :
        <React.Fragment>
          <div className="section-title">{label}交易</div>
          {dayGroups.length===0 && <div className="empty-hint">這段時間還沒有任何紀錄，點右下角「＋」新增一筆吧</div>}
          {dayGroups.map(g=>
            <React.Fragment key={g.date}>
              <div className="day-group-header">{formatDayLabel(g.date)}</div>
              {g.items.map(t=>
                <TxRow key={t.id} t={t} categories={categories} accounts={accounts} onClick={()=>onViewTx(t)} />
              )}
            </React.Fragment>
          )}
        </React.Fragment>
      }
    </div>
  );
}

function CalendarTab({categories, accounts, monthTx, cursorMonth, onAddOnDate, onViewTx}){
  const [activeDay, setActiveDay] = useState(null);
  const dim = daysInMonth(cursorMonth);
  const firstDow = new Date(cursorMonth.getFullYear(), cursorMonth.getMonth(), 1).getDay();
  const todayStr = toDateStr(new Date());
  const cells = [];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(d);

  function txOnDay(d){
    const ds = cursorMonth.getFullYear()+"-"+pad(cursorMonth.getMonth()+1)+"-"+pad(d);
    return monthTx.filter(t=>t.date===ds).slice().sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  }

  const dayList = activeDay? txOnDay(activeDay) : [];
  const activeDs = activeDay? cursorMonth.getFullYear()+"-"+pad(cursorMonth.getMonth()+1)+"-"+pad(activeDay) : null;

  return (
    <div>
      <div className="calendar-grid">
        {["日","一","二","三","四","五","六"].map(w=><div className="cal-dow" key={w}>{w}</div>)}
        {cells.map((d,i)=>{
          if(d===null) return <div className="cal-cell empty" key={i}></div>;
          const ds = cursorMonth.getFullYear()+"-"+pad(cursorMonth.getMonth()+1)+"-"+pad(d);
          const dayTx = txOnDay(d);
          const incomeSum = dayTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
          const expenseSum = dayTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
          return (
            <div key={i} className={"cal-cell"+(ds===todayStr?" today":"")} onClick={()=>setActiveDay(d)}>
              <span className="cal-day-num">{d}</span>
              {incomeSum>0 && <span className="cal-num income">{Math.round(incomeSum)}</span>}
              {expenseSum>0 && <span className="cal-num expense">{Math.round(expenseSum)}</span>}
            </div>
          );
        })}
      </div>

      {activeDay &&
        <div className="sheet-overlay" onClick={()=>setActiveDay(null)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"></div>
            <h2>{cursorMonth.getMonth()+1}月{activeDay}日</h2>
            {dayList.length===0 && <div className="empty-hint">這天還沒有紀錄</div>}
            {dayList.map(t=>
              <TxRow key={t.id} t={t} categories={categories} accounts={accounts}
                onClick={()=>{setActiveDay(null); onViewTx(t);}} />
            )}
            <div className="btn-row">
              <button className="btn ghost" onClick={()=>setActiveDay(null)}>關閉</button>
              <button className="btn primary" onClick={()=>{onAddOnDate(activeDs); setActiveDay(null);}}>＋ 在這天新增</button>
            </div>
          </div>
        </div>
      }
    </div>
  );
}

function LineChart({series, rangeMonths}){
  // series: [{label, color, values:[number]}]
  // values對應每個月的數值
  const W = 340, H = 200, PL = 58, PB = 28, PR = 10, PT = 14;
  const chartW = W - PL - PR;
  const chartH = H - PT - PB;
  const n = series[0] ? series[0].values.length : 0;
  if(n===0) return <div className="empty-hint">還沒有資料</div>;

  const allVals = series.flatMap(s=>s.values).filter(v=>isFinite(v));
  const rawMin = Math.min(...allVals);
  const rawMax = Math.max(...allVals);
  const pad2 = (rawMax - rawMin) * 0.1 || 1;
  const yMin = rawMin - pad2;
  const yMax = rawMax + pad2;
  const yRange = yMax - yMin;

  function xPos(i){ return PL + (n===1 ? chartW/2 : i/(n-1)*chartW); }
  function yPos(v){ return PT + chartH - ((v-yMin)/yRange)*chartH; }

  // nice gridlines
  const gridMax = niceMax(Math.abs(rawMax));
  const gridMin = rawMin < 0 ? -niceMax(Math.abs(rawMin)) : 0;
  const gridStep = niceMax((gridMax-gridMin)/3);
  const gridVals = [];
  for(let v=Math.ceil(gridMin/gridStep)*gridStep; v<=gridMax+gridStep*0.01; v+=gridStep){
    if(v>=yMin && v<=yMax) gridVals.push(v);
  }

  const labels = series[0].labels || [];

  return (
    <div className="chart-scroll-wrap">
      <svg width={Math.max(W, n*22+PL+PR)} height={H} style={{display:"block",overflow:"visible"}}>
        {/* 格線 */}
        {gridVals.map((v,i)=>{
          const y = yPos(v);
          return (
            <g key={i}>
              <line x1={PL} y1={y} x2={W-PR} y2={y} stroke="var(--line)" strokeDasharray="4,3" strokeWidth={1}/>
              <text x={PL-4} y={y+4} textAnchor="end" fontSize={10} fill="var(--ink-soft)">{Math.round(v).toLocaleString("zh-Hant-TW")}</text>
            </g>
          );
        })}
        {/* 折線 */}
        {series.map((s,si)=>{
          const pts = s.values.map((v,i)=>`${xPos(i)},${yPos(v)}`).join(" ");
          return (
            <g key={si}>
              <polyline points={pts} fill="none" stroke={s.color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
              {s.values.map((v,i)=>(
                <circle key={i} cx={xPos(i)} cy={yPos(v)} r={3} fill={s.color} />
              ))}
            </g>
          );
        })}
        {/* X軸標籤 */}
        {labels.map((lb,i)=>{
          const show = n<=12 || i===0 || i===n-1 || (i+1)%Math.ceil(n/6)===0;
          if(!show) return null;
          return <text key={i} x={xPos(i)} y={H-6} textAnchor="middle" fontSize={9} fill="var(--ink-soft)">{lb}</text>;
        })}
        {/* 基準線 */}
        <line x1={PL} y1={PT+chartH} x2={W-PR} y2={PT+chartH} stroke="var(--line)" strokeWidth={1}/>
      </svg>
    </div>
  );
}

function AnalysisTab({categories, transactions, accounts}){
  const [view, setView] = useState("networth"); // "networth" | "cashflow"
  const [rangeMonths, setRangeMonths] = useState(12);

  const monthLabels = useMemo(()=>{
    const today = new Date();
    const labels = [];
    for(let i=rangeMonths-1;i>=0;i--){
      const d = new Date(today.getFullYear(), today.getMonth()-i, 1);
      labels.push({
        key: d.getFullYear()+"-"+pad(d.getMonth()+1),
        label: (d.getFullYear()%100)+"/"+(d.getMonth()+1),
      });
    }
    return labels;
  }, [rangeMonths]);

  const networthSeries = useMemo(()=>{
    const values = monthLabels.map(({key})=>{
      // 計算到該月底的淨資產
      const endDate = key+"-31"; // 月底（>=月最後一天）
      const txUpTo = transactions.filter(t=>t.date<=endDate);
      let assets = 0, liabilities = 0;
      accounts.forEach(acc=>{
        const bal = accountBalance(acc, txUpTo);
        if(isLiability(acc.type)) liabilities += Math.max(0, bal);
        else assets += bal;
      });
      return assets - liabilities;
    });
    return [{
      label:"淨資產", color:"var(--income)", values,
      labels: monthLabels.map(m=>m.label),
    }];
  }, [monthLabels, transactions, accounts]);

  const cashflowSeries = useMemo(()=>{
    const income = [], expense = [];
    monthLabels.forEach(({key})=>{
      const tx = transactions.filter(t=>t.date.slice(0,7)===key);
      income.push(tx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0));
      expense.push(tx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0));
    });
    const labels = monthLabels.map(m=>m.label);
    return [
      {label:"收入", color:"var(--income)", values:income, labels},
      {label:"支出", color:"var(--expense)", values:expense, labels},
    ];
  }, [monthLabels, transactions]);

  const rangeOptions = [
    {v:6,  label:"6個月"},
    {v:12, label:"12個月"},
    {v:24, label:"24個月"},
    {v:36, label:"36個月"},
  ];

  const lastNetworth = networthSeries[0].values[networthSeries[0].values.length-1]||0;
  const firstNetworth = networthSeries[0].values[0]||0;
  const networthChange = lastNetworth - firstNetworth;
  const lastIncome = cashflowSeries[0].values[cashflowSeries[0].values.length-1]||0;
  const lastExpense = cashflowSeries[1].values[cashflowSeries[1].values.length-1]||0;

  return (
    <div>
      <div className="mode-toggle" style={{marginBottom:8}}>
        <button className={view==="networth"?"active":""} onClick={()=>setView("networth")}>淨資產趨勢</button>
        <button className={view==="cashflow"?"active":""} onClick={()=>setView("cashflow")}>收支趨勢</button>
      </div>
      <div style={{display:"flex",gap:6,justifyContent:"flex-end",marginBottom:12}}>
        {rangeOptions.map(o=>(
          <button key={o.v} onClick={()=>setRangeMonths(o.v)}
            style={{padding:"5px 10px",borderRadius:8,border:"1px solid var(--line)",
              background:rangeMonths===o.v?"var(--solid)":"var(--field-bg)",
              color:rangeMonths===o.v?"#fff":"var(--ink-soft)",fontSize:12,fontWeight:600}}>
            {o.label}
          </button>
        ))}
      </div>

      {view==="networth" &&
        <React.Fragment>
          <div className="chart-card">
            <h3>淨資產趨勢</h3>
            <LineChart series={networthSeries} rangeMonths={rangeMonths} />
            <div className="chart-detail" style={{marginTop:10}}>
              <span className="lbl">目前淨資產</span>
              <span style={{fontWeight:700}}>{fmtMoney(lastNetworth)}</span>
            </div>
            <div className="chart-detail" style={{paddingTop:6}}>
              <span className="lbl">{rangeMonths}個月變動</span>
              <span style={{color: networthChange>=0?"var(--income)":"var(--expense)",fontWeight:700}}>
                {networthChange>=0?"▲":"▼"}{fmtMoney(Math.abs(networthChange))}
              </span>
            </div>
          </div>
          <div className="acc-detail-stats">
            {accounts.filter(a=>!isLiability(a.type)).length>0 &&
              <div className="stat">
                <span>總資產</span>
                <b>{fmtMoney(accounts.filter(a=>!isLiability(a.type)).reduce((s,a)=>s+accountBalance(a,transactions),0))}</b>
              </div>
            }
            {accounts.filter(a=>isLiability(a.type)).length>0 &&
              <div className="stat">
                <span>總負債</span>
                <b className="neg">{fmtMoney(accounts.filter(a=>isLiability(a.type)).reduce((s,a)=>s+Math.max(0,accountBalance(a,transactions)),0))}</b>
              </div>
            }
          </div>
        </React.Fragment>
      }

      {view==="cashflow" &&
        <React.Fragment>
          <div className="chart-card">
            <h3>收支趨勢</h3>
            <LineChart series={cashflowSeries} rangeMonths={rangeMonths} />
            <div style={{display:"flex",gap:12,marginTop:10,justifyContent:"center",fontSize:12}}>
              <span><span style={{color:"var(--income)"}}>●</span> 收入</span>
              <span><span style={{color:"var(--expense)"}}>●</span> 支出</span>
            </div>
          </div>
          <div className="acc-detail-stats">
            <div className="stat">
              <span>本月收入</span>
              <b className="pos">{fmtMoney(lastIncome)}</b>
            </div>
            <div className="stat">
              <span>本月支出</span>
              <b className="neg">{fmtMoney(lastExpense)}</b>
            </div>
          </div>
        </React.Fragment>
      }
    </div>
  );
}

function CategoriesSection({categories, onAddCategory, onEditCategory, onDeleteCategory, onReorderCategoryGroup}){

  const expenseTree = buildTree(categories.filter(c=>c.type==="expense"));
  const incomeTree = buildTree(categories.filter(c=>c.type==="income"));

  function handleDelete(node){
    if(node.children.length>0){ alert("請先刪除子分類"); return; }
    if(!confirm("確定刪除「"+node.name+"」？已使用此分類的交易仍會保留分類ID，但顯示會變成未分類。")) return;
    onDeleteCategory(node.id);

  return (
    <div>
      <div className="cat-section">

          <h3>支出分類</h3>
          <button onClick={()=>setCatModal({type:"expense", parentId:null})}>＋ 新增大分類</button>

        <DragList items={expenseTree}
          onReorder={onReorderCategoryGroup}
          renderRow={(n, dragHandlers)=>
            <CategoryNode node={n} depth={0} dragHandlers={dragHandlers}

      </div>

      <div className="cat-section">
        <div className="cat-section-title">
          <h3>收入分類</h3>
          <button onClick={()=>setCatModal({type:"income", parentId:null})}>＋ 新增大分類</button>
        </div>
        <DragList items={incomeTree}
          onReorder={onReorderCategoryGroup}
          renderRow={(n, dragHandlers)=>
            <CategoryNode node={n} depth={0} dragHandlers={dragHandlers}
              onAddChild={(p)=>setCatModal({type:"income", parentId:p.id})}
              onEdit={(c)=>setCatModal({type:"income", parentId:c.parentId, initial:c})}
              onDelete={handleDelete}
              onReorderGroup={onReorderCategoryGroup} />
          } />

      {catModal &&
        <CategoryModal type={catModal.type} parentId={catModal.parentId} initial={catModal.initial}

    </div>
  );
}

function AccountRow({acc, transactions, dragHandlers, onView, onEdit, onDelete}){
  const bal = accountBalance(acc, transactions);
  const neg = isLiability(acc.type) ? bal>0 : bal<0;
  const isFixed = acc.type==="fixed" && acc.rate;
  return (
    <div className="acc-row">
      <span className="drag-handle" {...dragHandlers}>≡</span>
      <div className="acc-row-main" onClick={()=>onView(acc)}>
        <div className={"acc-icon"+(acc.type==="credit"?" card-shape":"")}>
          {acc.iconImage ? <img src={acc.iconImage} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} /> : (acc.icon||"💰")}
        </div>
        <div className="acc-name-wrap">
          <span className="name">{acc.name}</span>
          {isFixed && <span className="acc-sub">利率 {acc.rate}%・每月利息 {fmtMoney(monthlyInterest(acc))}</span>}
        </div>
        <span className={"bal"+(neg?" neg":"")}>{fmtMoney(Math.abs(bal))}</span>
      </div>
      <button className="icon-btn" onClick={()=>onEdit(acc)}>✏️</button>
      <button className="icon-btn" onClick={()=>onDelete(acc)}>🗑</button>
    </div>
  );
}

function AccountDetailSheet({acc, transactions, categories, accounts, onViewTx, onClose}){
  const [yearFilter, setYearFilter] = useState("all");

  const acctTx = useMemo(()=>{
    return transactions.filter(t=>
      t.type==="transfer" ? (t.fromAccountId===acc.id || t.toAccountId===acc.id) : t.accountId===acc.id
    );
  }, [transactions, acc.id]);

  const years = useMemo(()=>{
    const set = new Set(acctTx.map(t=>t.date.slice(0,4)));
    return Array.from(set).sort((a,b)=>b.localeCompare(a));
  }, [acctTx]);

  const filteredTx = useMemo(()=>{
    if(yearFilter==="all") return acctTx;
    return acctTx.filter(t=>t.date.slice(0,4)===yearFilter);
  }, [acctTx, yearFilter]);

  const totalIncome = filteredTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalExpense = filteredTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const totalTransferIn = filteredTx.filter(t=>t.type==="transfer" && t.toAccountId===acc.id).reduce((s,t)=>s+t.amount,0);
  const totalTransferOut = filteredTx.filter(t=>t.type==="transfer" && t.fromAccountId===acc.id).reduce((s,t)=>s+t.amount,0);
  const currentBalance = accountBalance(acc, transactions);

  const byCat = {};
  filteredTx.filter(t=>t.type==="expense").forEach(t=>{
    byCat[t.categoryId] = (byCat[t.categoryId]||0) + t.amount;
  });
  const catEntries = Object.entries(byCat).map(([id,val])=>{
    const cat = catById(categories, id);
    return {id, value:val, name: cat?cat.name:"未分類", color: cat?cat.color:"#ccc"};
  }).sort((a,b)=>b.value-a.value);
  const donutData = catEntries.length>6 ?
    [...catEntries.slice(0,6), {id:"_rest", value:catEntries.slice(6).reduce((s,e)=>s+e.value,0), name:"其他", color:"#B8AFA2"}]
    : catEntries;

  const dayGroups = groupByDate(filteredTx);

  return (
    <div className="sheet-overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="detail-header">
          <h2 className="detail-title">{acc.icon} {acc.name}</h2>
          <button className="detail-close-x" onClick={onClose}>✕</button>
        </div>

        <div className="acc-detail-balance">
          <div className="nw-label">目前餘額</div>
          <div className="nw-value">{fmtMoney(currentBalance)}</div>
          {acc.type==="fixed" && acc.rate &&
            <div className="acc-sub">利率 {acc.rate}%・{acc.startDate} ~ {acc.endDate}</div>
          }
        </div>

        <div className="acc-detail-stats">
          <div className="stat"><span>總收入</span><b className="pos">{fmtMoney(totalIncome)}</b></div>
          <div className="stat"><span>總支出</span><b className="neg">{fmtMoney(totalExpense)}</b></div>
          <div className="stat"><span>總轉入</span><b>{fmtMoney(totalTransferIn)}</b></div>
          <div className="stat"><span>總轉出</span><b>{fmtMoney(totalTransferOut)}</b></div>
        </div>

        {years.length>0 &&
          <div className="acc-detail-year-row">
            <select value={yearFilter} onChange={e=>setYearFilter(e.target.value)}>
              <option value="all">全部時間</option>
              {years.map(y=><option key={y} value={y}>{y}年</option>)}
            </select>
          </div>
        }

        {donutData.length>0 &&
          <div className="chart-card">
            <h3>支出分類佔比</h3>
            <div className="donut-wrap">
              <Donut data={donutData} />
              <div className="donut-legend">
                {donutData.map(d=>(
                  <div className="legend-row" key={d.id}>
                    <span className="legend-dot" style={{background:d.color}}></span>
                    <span className="name">{d.name}</span>
                    <span className="val">{fmtMoney(d.value)}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        }

        <div className="section-title">交易明細</div>
        {dayGroups.length===0 && <div className="empty-hint">這段時間沒有相關交易</div>}
        {dayGroups.map(g=>
          <React.Fragment key={g.date}>
            <div className="day-group-header">{formatDayLabel(g.date)}</div>
            {g.items.map(t=>
              <TxRow key={t.id} t={t} categories={categories} accounts={accounts} onClick={()=>onViewTx(t)} />
            )}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function AccountsSection({accounts, transactions, categories, onViewTx, onAddAccount, onEditAccount, onDeleteAccount, onReorderGroup}){
  const [modal, setModal] = useState(null); // {initial, defaultType}
  const [viewingAcc, setViewingAcc] = useState(null);

  function handleDelete(acc){
    if(!confirm("確定刪除「"+acc.name+"」？已記錄在這個帳戶的交易仍會保留，但不再計入任何帳戶餘額。")) return;
    onDeleteAccount(acc.id);
  }

  return (
    <div>
      {ACCOUNT_TYPES.map(t=>{
        const group = accounts.filter(a=>a.type===t.key).sort((a,b)=>(a.order||0)-(b.order||0));
        return (
          <div className="acc-section" key={t.key}>
            <div className="acc-section-title">
              <h3>{t.icon} {t.label}</h3>
              <button onClick={()=>setModal({defaultType:t.key})}>＋ 新增{t.label}</button>
            </div>
            {group.length===0 && <div className="empty-hint">還沒有{t.label}帳戶</div>}
            <DragList items={group}
              onReorder={(newList)=>onReorderGroup(newList)}
              renderRow={(acc, dragHandlers)=>
                <AccountRow acc={acc} transactions={transactions} dragHandlers={dragHandlers}
                  onView={(a)=>setViewingAcc(a)}
                  onEdit={(a)=>setModal({initial:a})} onDelete={handleDelete} />
              } />
          </div>
        );
      })}

      {modal &&
        <AccountModal initial={modal.initial} defaultType={modal.defaultType} accounts={accounts}
          onClose={()=>setModal(null)}
          onSave={(data)=>{
            if(modal.initial) onEditAccount(modal.initial.id, data);
            else onAddAccount(data);
            setModal(null);
          }} />

      {viewingAcc &&
        <AccountDetailSheet acc={viewingAcc} transactions={transactions} categories={categories} accounts={accounts}

          onClose={()=>setViewingAcc(null)} />
      }
    </div>
  );
}

function InvestmentsSection({investments, onAddInvestment, onEditInvestment, onDeleteInvestment}){
  const [modal, setModal] = useState(null);

    if(!confirm("確定刪除「"+inv.name+"」這筆持股紀錄？")) return;
    onDeleteInvestment(inv.id);
  }
  const totalValue = investments.reduce((s,i)=>s+invMarketValue(i),0);
  const totalCost = investments.reduce((s,i)=>s+invCostBasis(i),0);
  const totalGain = totalValue - totalCost;
  const totalPct = totalCost>0 ? (totalGain/totalCost*100) : 0;
  const totalDiv = investments.reduce((s,i)=>s+(i.totalDividends||0),0);
  const posTotal = totalGain>=0;

  return (
    <div>
      {investments.length>0 &&
        <div className="inv-summary">
          <div className="row"><span className="lbl">總現值</span><span className="val">{fmtMoney(totalValue)}</span></div>
          <div className="row"><span className="lbl">總成本</span><span className="val">{fmtMoney(totalCost)}</span></div>
          <div className="row"><span className="lbl">總損益（不含息）</span>
            <span className={"val "+(posTotal?"pos":"neg")}>{posTotal?"+":""}{fmtMoney(totalGain)}（{posTotal?"+":""}{totalPct.toFixed(2)}%）</span></div>

        {investments.length===0 && <div className="empty-hint">還沒有任何持股，先加一筆 0050 或 2330 試試</div>}

            setModal(null);
          }} />

}

function SettingsTab({categories, accounts, transactions, investments, onViewTx,
  onAddCategory, onEditCategory, onDeleteCategory, onReorderCategoryGroup,
  onAddAccount, onEditAccount, onDeleteAccount, onReorderGroup,
  onAddInvestment, onEditInvestment, onDeleteInvestment}){
  const [mode, setMode] = useState("account");
  const [masked, setMasked] = useState(false);

  const acctAssets = accounts.filter(a=>!isLiability(a.type)).reduce((s,a)=>s+accountBalance(a,transactions),0);
  const liabilities = accounts.filter(a=>isLiability(a.type)).reduce((s,a)=>s+accountBalance(a,transactions),0);
  const investAssets = investments.reduce((s,inv)=>s+invMarketValue(inv),0);
  const assets = acctAssets + investAssets;
  const netWorth = assets - liabilities;

  return (
    <div>
      {(mode==="account"||mode==="invest") &&
        <div className="networth-card">
          <div className="nw-top">
            <span className="nw-label">淨資產</span>
            <button className="nw-mask-btn" onClick={()=>setMasked(m=>!m)}>{masked?"🙈":"👁"}</button>
          </div>
          <div className="nw-value">{maskMoney(netWorth, masked)}</div>
          <div className="nw-split">
            <span>資產 <b>{maskMoney(assets, masked)}</b></span>
            <span>負債 <b>{maskMoney(liabilities, masked)}</b></span>
          </div>
        </div>
      }
      <div className="settings-mode-toggle">
        <button className={mode==="category"?"active":""} onClick={()=>setMode("category")}>分類</button>
        <button className={mode==="account"?"active":""} onClick={()=>setMode("account")}>帳戶</button>
        <button className={mode==="invest"?"active":""} onClick={()=>setMode("invest")}>投資</button>
      </div>
      {mode==="category" &&
        <CategoriesSection categories={categories}
          onAddCategory={onAddCategory} onEditCategory={onEditCategory} onDeleteCategory={onDeleteCategory}
          onReorderCategoryGroup={onReorderCategoryGroup} />
      }
      {mode==="account" &&
        <AccountsSection accounts={accounts} transactions={transactions} categories={categories} onViewTx={onViewTx}
          onAddAccount={onAddAccount} onEditAccount={onEditAccount} onDeleteAccount={onDeleteAccount} onReorderGroup={onReorderGroup} />
      }
      {mode==="invest" &&
        <InvestmentsSection investments={investments}
          onAddInvestment={onAddInvestment} onEditInvestment={onEditInvestment} onDeleteInvestment={onDeleteInvestment} />
      }
    </div>
  );
}

/* ---------- App ---------- */
function App(){
  const [categories, setCategories] = useState([]);
  const [transactions, setTransactions] = useState([]);
  const [budgets, setBudgets] = useState([]);
  const [accounts, setAccounts] = useState([]);
  const [investments, setInvestments] = useState([]);
  const [tab, setTab] = useState("home");
  const [homeMode, setHomeMode] = useState("list");
  const [cursorMonth, setCursorMonth] = useState(()=>{const d=new Date(); d.setDate(1); return d;});
  const [homeRangeMode, setHomeRangeMode] = useState("month");
  const [homeRangeStart, setHomeRangeStart] = useState(()=>{const d=new Date(); d.setDate(1); return toDateStr(d);});
  const [homeRangeEnd, setHomeRangeEnd] = useState(()=>toDateStr(new Date()));
  const [showMonthPicker, setShowMonthPicker] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [showActionMenu, setShowActionMenu] = useState(false);
  const [addKind, setAddKind] = useState("txn");
  const [editingTx, setEditingTx] = useState(null);
  const [viewingTx, setViewingTx] = useState(null);
  const [presetDate, setPresetDate] = useState(null);
  const [presetType, setPresetType] = useState(null);
  const [msg, setMsg] = useState(null);
  const [darkMode, setDarkMode] = useState(()=>{
    try{
      const saved = localStorage.getItem("theme");
      if(saved) return saved==="dark";
      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    }catch(e){ return false; }
  });
  const seeded = useRef(false);
  const seededAcc = useRef(false);

  useEffect(()=>{
    document.documentElement.classList.toggle("dark", darkMode);
    try{ localStorage.setItem("theme", darkMode?"dark":"light"); }catch(e){}
  }, [darkMode]);

  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"categories"), snap=>{
      const list = snap.docs.map(d=>({id:d.id, ...d.data()}));
      setCategories(list);
      if(list.length===0 && !seeded.current){
        seeded.current = true;
        seedDefaultCategories();
      }
    });
    return unsub;
  }, []);

  useEffect(()=>{
    const unsub = onSnapshot(query(collection(db,"transactions"), orderBy("date","desc")), snap=>{
      setTransactions(snap.docs.map(d=>({id:d.id, ...d.data()})));
    });
    return unsub;
  }, []);

  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"budgets"), snap=>{
      setBudgets(snap.docs.map(d=>({id:d.id, ...d.data()})));
    });
    return unsub;
  }, []);

  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"accounts"), snap=>{
      const list = snap.docs.map(d=>({id:d.id, ...d.data()}));
      setAccounts(list);
      if(list.length===0 && !seededAcc.current){
        seededAcc.current = true;
        seedDefaultAccount();
      }
    });
    return unsub;
  }, []);

  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"investments"), snap=>{
      setInvestments(snap.docs.map(d=>({id:d.id, ...d.data()})));
    });
    return unsub;
  }, []);

  const generatingInterestRef = useRef(false);
  async function generateDueInterest(){
    if(generatingInterestRef.current) return;
    const fixedAccounts = accounts.filter(a=>a.type==="fixed" && a.rate && a.startDate && a.endDate);
    if(fixedAccounts.length===0) return;
    generatingInterestRef.current = true;
    try{
      const today = new Date();
      let interestCat = categories.find(c=>c.type==="income" && c.name==="利息" && !c.parentId);
      let interestCatId = interestCat ? interestCat.id : null;
      if(!interestCatId){
        const siblings = categories.filter(c=>c.type==="income" && !c.parentId);
        const maxOrder = siblings.reduce((m,c)=>Math.max(m, c.order||0), -1);
        const ref = await addDoc(collection(db,"categories"), {
          name:"利息", type:"income", icon:"💹", parentId:null,
          color:PALETTE[siblings.length%PALETTE.length], order:maxOrder+1,
        });
        interestCatId = ref.id;
      }
      const batch = writeBatch(db);
      let any = false;
      fixedAccounts.forEach(acc=>{
        const monthly = monthlyInterest(acc);
        const targetAccountId = acc.interestAccountId || acc.id;
        dueInterestDates(acc, today).forEach(ds=>{
          const exists = transactions.some(t=>t.autoInterest && t.accountId===targetAccountId && t.date===ds && t.note===(acc.name+" 利息"));
          if(!exists){
            const ref = doc(collection(db,"transactions"));
            batch.set(ref, {
              type:"income", amount:Math.round(monthly), categoryId:interestCatId,
              accountId:targetAccountId,
              date:ds, note:acc.name+" 利息", autoInterest:true, createdAt:Date.now(),
            });
            any = true;
          }
        });
      });
      if(any) await batch.commit();
    }finally{
      generatingInterestRef.current = false;
    }
  }
  useEffect(()=>{ generateDueInterest(); }, [accounts, transactions, categories]);

  function flash(text){ setMsg(text); setTimeout(()=>setMsg(null), 1600); }

  function prevMonth(){ setCursorMonth(d=>{const nd=new Date(d); nd.setMonth(nd.getMonth()-1); return nd;}); }
  function nextMonth(){ setCursorMonth(d=>{const nd=new Date(d); nd.setMonth(nd.getMonth()+1); return nd;}); }
  function jumpToMonth(y, m){ setCursorMonth(new Date(y, m-1, 1)); }

  const monthTx = useMemo(()=>{
    const key = monthKey(cursorMonth);
    return transactions.filter(t=>t.date && t.date.slice(0,7)===key);
  }, [transactions, cursorMonth]);

  const rangeTx = useMemo(()=>{
    if(homeRangeMode!=="custom") return monthTx;
    if(homeRangeEnd < homeRangeStart) return [];
    return transactions.filter(t=>t.date && t.date>=homeRangeStart && t.date<=homeRangeEnd);
  }, [transactions, homeRangeMode, homeRangeStart, homeRangeEnd, monthTx]);

  function openEditTx(t){
    setEditingTx(t);
    setAddKind(t.type==="transfer" ? "transfer" : "txn");
    setShowAdd(true);
  }
  function openViewTx(t){
    setViewingTx(t);
  }
  function closeAddModals(){
    setShowAdd(false); setEditingTx(null); setPresetDate(null); setPresetType(null); setAddKind("txn");
  }
  async function saveTx(data){
    try{
      if(editingTx) await updateDoc(doc(db,"transactions",editingTx.id), data);
      else await addDoc(collection(db,"transactions"), {...data, createdAt:Date.now()});
      closeAddModals();
      flash("已儲存");
    }catch(e){ alert("儲存失敗："+e.message); }
  }
  async function deleteTx(id){
    if(!confirm("確定刪除這筆交易？")) return;
    await deleteDoc(doc(db,"transactions",id));
    closeAddModals();
    flash("已刪除");
  }
  async function addCategory(data){
    const siblings = categories.filter(c=>c.type===data.type && (c.parentId||null)===(data.parentId||null));
    const maxOrder = siblings.reduce((m,c)=>Math.max(m, c.order||0), -1);
    await addDoc(collection(db,"categories"), {...data, order:maxOrder+1});
  }
  async function reorderCategoryGroup(newList){
    const batch = writeBatch(db);
    newList.forEach((c,i)=>{ batch.update(doc(db,"categories",c.id), {order:i}); });
    await batch.commit();
  }
  async function editCategory(id, data){ await updateDoc(doc(db,"categories",id), data); }
  async function deleteCategory(id){
    await deleteDoc(doc(db,"categories",id));
    const b = budgets.find(b=>b.categoryId===id);
    if(b) await deleteDoc(doc(db,"budgets",b.id));
  }
  async function setBudget(categoryId, limit){
    const existing = budgets.find(b=>b.categoryId===categoryId);
    if(limit===null){
      if(existing) await deleteDoc(doc(db,"budgets",existing.id));
      return;
    }
    if(existing) await updateDoc(doc(db,"budgets",existing.id), {monthlyLimit:limit});
    else await addDoc(collection(db,"budgets"), {categoryId, monthlyLimit:limit});
  }

  async function addAccount(data){
    const sameType = accounts.filter(a=>a.type===data.type);
    const maxOrder = sameType.reduce((m,a)=>Math.max(m, a.order||0), -1);
    await addDoc(collection(db,"accounts"), {...data, order:maxOrder+1});
  }
  async function editAccount(id, data){ await updateDoc(doc(db,"accounts",id), data); }
  async function deleteAccount(id){ await deleteDoc(doc(db,"accounts",id)); }
  async function reorderAccountGroup(newList){
    const batch = writeBatch(db);
    newList.forEach((acc, i)=>{ batch.update(doc(db,"accounts",acc.id), {order:i}); });
    await batch.commit();
  }

  async function addInvestment(data){ await addDoc(collection(db,"investments"), data); }
  async function editInvestment(id, data){ await updateDoc(doc(db,"investments",id), data); }
  async function deleteInvestment(id){ await deleteDoc(doc(db,"investments",id)); }

  const showMonthSwitcher = tab==="home" && (homeMode==="calendar" || homeRangeMode==="month");
  const showDateRangeRow = tab==="home" && homeMode==="list" && homeRangeMode==="custom";

  return (
    <div className="app">
      <div className="header">
        <h1>我的資產</h1>
        <button className="theme-toggle" onClick={()=>setDarkMode(d=>!d)}>{darkMode?"☀️":"🌙"}</button>
      </div>
      {tab==="home" && homeMode==="list" &&
        <div className="range-mode-row">
          <button className="range-mode-link" onClick={()=>setHomeRangeMode(m=>m==="month"?"custom":"month")}>
            {homeRangeMode==="month" ? "改用自訂區間" : "改用選月份"}
          </button>
        </div>
      }
      {showMonthSwitcher &&
        <MonthSwitcher date={cursorMonth} onPrev={prevMonth} onNext={nextMonth} onJump={()=>setShowMonthPicker(true)} />
      }
      {showDateRangeRow &&
        <div className="date-range-row">
          <input type="date" value={homeRangeStart} onChange={e=>setHomeRangeStart(e.target.value)} />
          <span>～</span>
          <input type="date" value={homeRangeEnd} onChange={e=>setHomeRangeEnd(e.target.value)} />
        </div>
      }

      <div className="content">
        {tab==="home" &&
          <React.Fragment>
            <div className="mode-toggle">
              <button className={homeMode==="list"?"active":""} onClick={()=>setHomeMode("list")}>收支清冊</button>
              <button className={homeMode==="calendar"?"active":""} onClick={()=>setHomeMode("calendar")}>日曆</button>
            </div>
            {homeMode==="list" ?
              <OverviewTab categories={categories} accounts={accounts} monthTx={rangeTx} allTx={transactions}
                periodLabel={homeRangeMode==="custom"?"區間":"本月"}
                onViewTx={openViewTx} />
              :
              <CalendarTab categories={categories} accounts={accounts} monthTx={monthTx} cursorMonth={cursorMonth}
                onAddOnDate={(ds)=>{setPresetDate(ds); setPresetType(null); setEditingTx(null); setAddKind("txn"); setShowAdd(true);}}
                onViewTx={openViewTx} />
            }
          </React.Fragment>
        }
        {tab==="analysis" &&
          <AnalysisTab categories={categories} transactions={transactions} accounts={accounts} />
        }
        {tab==="settings" &&
          <SettingsTab categories={categories} accounts={accounts} transactions={transactions} investments={investments} onViewTx={openViewTx}
            onAddCategory={addCategory} onEditCategory={editCategory} onDeleteCategory={deleteCategory}
            onReorderCategoryGroup={reorderCategoryGroup}
            onAddAccount={addAccount} onEditAccount={editAccount} onDeleteAccount={deleteAccount}
            onReorderGroup={reorderAccountGroup}
            onAddInvestment={addInvestment} onEditInvestment={editInvestment} onDeleteInvestment={deleteInvestment} />
        }
      </div>

      {tab==="home" &&
        <button className="fab" onClick={()=>{
          setEditingTx(null); setPresetDate(null); setPresetType(null); setShowActionMenu(true);
        }}>＋</button>
      }

      <BottomNav tab={tab} setTab={setTab} />

      {showMonthPicker &&
        <MonthPickerSheet year={cursorMonth.getFullYear()} month={cursorMonth.getMonth()+1}
          onPick={jumpToMonth}
          onClose={()=>setShowMonthPicker(false)} />
      }

      {viewingTx &&
        <TxDetailSheet t={viewingTx} categories={categories} accounts={accounts}
          onClose={()=>setViewingTx(null)}
          onEdit={()=>{ const t=viewingTx; setViewingTx(null); openEditTx(t); }} />
      }
      {showActionMenu &&
        <AddActionSheet
          onClose={()=>setShowActionMenu(false)}
          onPick={(kind)=>{
            setShowActionMenu(false);
            setEditingTx(null);
            if(kind==="transfer"){ setAddKind("transfer"); }
            else { setAddKind("txn"); setPresetType(kind); }
            setShowAdd(true);
          }} />
      }
      {showAdd && addKind==="txn" &&
        <AddTxModal categories={categories} accounts={accounts}
          initial={editingTx ? editingTx : ((presetDate||presetType) ? {date:presetDate, type:presetType} : null)}
          onSave={saveTx} onDelete={deleteTx}
          onClose={closeAddModals} />
      }
      {showAdd && addKind==="transfer" &&
        <TransferModal accounts={accounts}
          initial={editingTx}
          onSave={saveTx} onDelete={deleteTx}
          onClose={closeAddModals} />
      }
      {msg && <div className="top-msg">{msg}</div>}
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
