<script>
  window.addEventListener('error', function(e){
    showErrBox((e.error && (e.error.stack||e.error.message)) || e.message || String(e));
  });
  window.addEventListener('unhandledrejection', function(e){
    var r = e.reason;
    showErrBox('Promise rejection: ' + ((r && (r.stack||r.message)) || String(r)));
  });
  function showErrBox(text){
    var el = document.getElementById('err-box');
    if(!el){
      el = document.createElement('div');
      el.id = 'err-box';
      el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#B5615B;color:#fff;padding:14px;font-size:12px;z-index:99999;white-space:pre-wrap;max-height:70vh;overflow:auto;font-family:monospace;';
      document.body.appendChild(el);
    }
    var line = document.createElement('div');
    line.style.marginBottom = '10px';
    line.textContent = text;
    el.appendChild(line);
  }
</script>

function pad(n){return n<10?"0"+n:""+n;}
function toDateStr(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function fromDateStr(s){const p=s.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}
function monthKey(d){return d.getFullYear()+"-"+pad(d.getMonth()+1);}
function fmtMoney(n){return "NT$"+Math.round(n||0).toLocaleString("zh-Hant-TW");}
function fmtMonthLabel(d){return d.getFullYear()+"年"+(d.getMonth()+1)+"月";}
function daysInMonth(d){return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}

const ACCOUNT_TYPES = [
  {key:"wallet", label:"錢包", icon:"👛"},
  {key:"checking", label:"活存", icon:"🏦"},
  {key:"credit", label:"信用", icon:"💳"},
  {key:"fixed", label:"定存", icon:"🔐"},
];
function accTypeInfo(key){return ACCOUNT_TYPES.find(t=>t.key===key) || ACCOUNT_TYPES[0];}
function isLiability(type){return type==="credit";}

function accountBalance(acc, transactions){
  let bal = acc.initialBalance || 0;
  transactions.forEach(t=>{
    if(t.accountId !== acc.id) return;
    if(isLiability(acc.type)){
      if(t.type==="expense") bal += t.amount;
      else bal -= t.amount;
    }else{
      if(t.type==="income") bal += t.amount;
      else bal -= t.amount;
    }
  });
  return bal;
}

function invMarketValue(inv){ return (inv.shares||0) * (inv.currentPrice||0); }
function invCostBasis(inv){ return (inv.shares||0) * (inv.avgCost||0); }
function invGain(inv){ return invMarketValue(inv) - invCostBasis(inv); }
function invReturnPct(inv){
  const cost = invCostBasis(inv);
  return cost>0 ? (invGain(inv)/cost*100) : 0;
}

function fileToIconDataURL(file, size){
  size = size || 56;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement("canvas");
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext("2d");
        const s = Math.min(img.width, img.height);
        const sx = (img.width-s)/2, sy = (img.height-s)/2;
        ctx.drawImage(img, sx, sy, s, s, 0, 0, size, size);
        resolve(canvas.toDataURL("image/png"));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function buildTree(list){
  const map={};
  list.forEach(c=>map[c.id]={...c, children:[]});
  const roots=[];
  list.forEach(c=>{
    if(c.parentId && map[c.parentId]) map[c.parentId].children.push(map[c.id]);
    else roots.push(map[c.id]);
  });
  return roots;
}
function flattenForSelect(list, type){
  const roots=buildTree(list.filter(c=>c.type===type));
  const out=[];
  function walk(node, depth){
    out.push({id:node.id, label:"\u3000".repeat(depth)+(node.icon||"")+" "+node.name});
    node.children.forEach(ch=>walk(ch, depth+1));
  }
  roots.forEach(r=>walk(r,0));
  return out;
}
function catById(list, id){return list.find(c=>c.id===id);}

async function seedDefaultCategories(){
  const batch = writeBatch(db);
  DEFAULT_CATEGORIES.forEach((c,i)=>{
    const ref = doc(collection(db,"categories"));
    batch.set(ref, {name:c.name, type:c.type, icon:c.icon, parentId:null, color:PALETTE[i%PALETTE.length]});
  });
  await batch.commit();
}
async function seedDefaultAccount(){

}

function BarChart({data}){
  const max = Math.max(1, ...data.map(d=>Math.abs(d.value)));
  return (
    <div className="barchart">
      {data.map((d,i)=>(
        <div className="bar-col" key={i}>

          <span className="bar-label">{d.label}</span>
        </div>
      ))}
    </div>
  );

function Donut({data, size}){
  size = size || 140;
  const thickness = 20;
  const total = data.reduce((s,d)=>s+d.value,0) || 1;
  const radius = (size-thickness)/2;
  const circumference = 2*Math.PI*radius;
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      <g transform={"translate("+size/2+","+size/2+") rotate(-90)"}>
        {data.map((d,i)=>{
          const frac = d.value/total;
          const dash = frac*circumference;
          const el = (
            <circle key={i} r={radius} fill="none" stroke={d.color} strokeWidth={thickness}
              strokeDasharray={dash+" "+(circumference-dash)} strokeDashoffset={-offset}></circle>
          );
          offset += dash;
          return el;
        })}
      </g>
      <text x="50%" y="50%" textAnchor="middle" dominantBaseline="middle" fontSize="12" fill="var(--ink)">支出</text>
    </svg>
  );
}

/* 通用拖曳排序清單：用 Pointer Events，手機/桌面都通用 */
function DragList({items, onReorder, renderRow}){
  const [list, setList] = useState(items);
  const [draggingId, setDraggingId] = useState(null);
  const [dragOffset, setDragOffset] = useState(0);
  const startYRef = useRef(0);
  const refs = useRef({});

  useEffect(()=>{ setList(items); }, [items.map(it=>it.id).join(",")]);

  function startDrag(id, e){
    e.preventDefault();
    try{ e.target.setPointerCapture(e.pointerId); }catch(err){}
    startYRef.current = e.clientY;
    setDraggingId(id);
    setDragOffset(0);
  }
  function onMove(e){
    if(draggingId==null) return;
    const dy = e.clientY - startYRef.current;
    setDragOffset(dy);
    const idx = list.findIndex(it=>it.id===draggingId);
    const el = refs.current[draggingId];
    if(!el || idx<0) return;
    const rect = el.getBoundingClientRect();
    const myCenter = rect.top + rect.height/2 + dy;
    let newIdx = idx;
    list.forEach((it,i)=>{
      if(it.id===draggingId) return;
      const r = refs.current[it.id];
      if(!r) return;
      const rr = r.getBoundingClientRect();
      const c = rr.top + rr.height/2;
      if(i<idx && myCenter < c) newIdx = Math.min(newIdx, i);
      if(i>idx && myCenter > c) newIdx = Math.max(newIdx, i);
    });
    if(newIdx!==idx){
      const next = list.slice();
      const moved = next.splice(idx,1)[0];
      next.splice(newIdx,0,moved);
      setList(next);
      startYRef.current = e.clientY;
      setDragOffset(0);
    }
  }
  function endDrag(){
    if(draggingId!=null) onReorder(list);
    setDraggingId(null);
    setDragOffset(0);
  }

  return (
    <div>
      {list.map(it=>(
        <div key={it.id} ref={el=>{refs.current[it.id]=el;}}
          style={it.id===draggingId ? {transform:"translateY("+dragOffset+"px)", position:"relative", zIndex:5} : {transition:"transform .15s"}}>
          {renderRow(it, {onPointerDown:(e)=>startDrag(it.id,e), onPointerMove:onMove, onPointerUp:endDrag, onPointerCancel:endDrag})}
        </div>
      ))}
    </div>
  );
}

  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(d);

  function txOnDay(d){
    const ds = cursorMonth.getFullYear()+"-"+pad(cursorMonth.getMonth()+1)+"-"+pad(d);
    return monthTx.filter(t=>t.date===ds);
  }

  const dayList = activeDay? txOnDay(activeDay) : [];

          if(d===null) return <div className="cal-cell empty" key={i}></div>;
          const ds = cursorMonth.getFullYear()+"-"+pad(cursorMonth.getMonth()+1)+"-"+pad(d);
          const dayTx = txOnDay(d);

            <div key={i} className={"cal-cell"+(ds===todayStr?" today":"")} onClick={()=>setActiveDay(d)}>
              <span>{d}</span>
              {(hasIncome||hasExpense) &&
                <div className="cal-dots">

            </div>
          </div>
        </div>
      }
    </div>
  );
}

function AnalysisTab({categories, transactions, cursorMonth, cursorYear}){
  const [mode, setMode] = useState("month");

  const monthData = useMemo(()=>{
    const key = monthKey(cursorMonth);
    const tx = transactions.filter(t=>t.date.slice(0,7)===key);
    const dim = daysInMonth(cursorMonth);
    const daily = [];
    for(let d=1;d<=dim;d++){
      const ds = key+"-"+pad(d);
      const income = tx.filter(t=>t.type==="income"&&t.date===ds).reduce((s,t)=>s+t.amount,0);
      const expense = tx.filter(t=>t.type==="expense"&&t.date===ds).reduce((s,t)=>s+t.amount,0);
      daily.push({label:String(d), value: income-expense});
    }
    const byCat = {};
    tx.filter(t=>t.type==="expense").forEach(t=>{
      byCat[t.categoryId] = (byCat[t.categoryId]||0) + t.amount;
    });
    return {daily, byCat, tx};
  }, [transactions, cursorMonth]);

  const yearData = useMemo(()=>{
    const months = [];
    for(let m=0;m<12;m++){
      const key = cursorYear+"-"+pad(m+1);
      const tx = transactions.filter(t=>t.date.slice(0,7)===key);
      months.push({
        label:(m+1)+"月",
        income: tx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0),
        expense: tx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0),
      });
    }
    const byCat = {};
    transactions.filter(t=>t.type==="expense" && t.date.slice(0,4)===String(cursorYear)).forEach(t=>{
      byCat[t.categoryId] = (byCat[t.categoryId]||0) + t.amount;
    });
    return {months, byCat};
  }, [transactions, cursorYear]);

  function donutData(byCat){
    const entries = Object.entries(byCat).map(([id,val])=>{
      const cat = catById(categories, id);
      return {id, value:val, name: cat?cat.name:"未分類", color: cat?cat.color:"#ccc"};
    }).sort((a,b)=>b.value-a.value);
    if(entries.length>6){
      const top = entries.slice(0,6);
      const restVal = entries.slice(6).reduce((s,e)=>s+e.value,0);
      top.push({id:"_rest", value:restVal, name:"其他", color:"#B8AFA2"});
      return top;
    }
    return entries;
  }

  const data = mode==="month" ? donutData(monthData.byCat) : donutData(yearData.byCat);

  return (
    <div>
      <div className="mode-toggle">
        <button className={mode==="month"?"active":""} onClick={()=>setMode("month")}>本月</button>
        <button className={mode==="year"?"active":""} onClick={()=>setMode("year")}>本年</button>
      </div>

      {mode==="month" ?
        <div className="chart-card">
          <h3>每日收支淨額</h3>
          <BarChart data={monthData.daily} />
        </div>
        :
        <div className="chart-card">
          <h3>每月收支（淺色收入／深色支出）</h3>
          <GroupedBarChart months={yearData.months} />
        </div>
      }

      <div className="chart-card">
        <h3>{mode==="month"?"本月":"本年"}支出分類佔比</h3>
        {data.length===0 ? <div className="empty-hint">還沒有支出紀錄</div> :
          <div className="donut-wrap">
            <Donut data={data} />
            <div className="donut-legend">
              {data.map(d=>(
                <div className="legend-row" key={d.id}>
                  <span className="legend-dot" style={{background:d.color}}></span>
                  <span className="name">{d.name}</span>
                  <span className="val">{fmtMoney(d.value)}</span>
                </div>
              ))}
            </div>
          </div>
        }
      </div>
    </div>
  );
}

function CategoryNode({node, depth, budgets, onAddChild, onEdit, onDelete, onBudget}){
  const budget = budgets.find(b=>b.categoryId===node.id);
  return (
    <div className="cat-node">
      <div className="cat-row">
        <span className="dot" style={{background:node.color}}></span>
        <span className="name">{node.icon} {node.name}</span>
        {node.type==="expense" &&
          <span className="budget-tag" onClick={()=>onBudget(node)}>
            {budget?("預算 "+fmtMoney(budget.monthlyLimit)):"設預算"}
          </span>
        }
        <button className="icon-btn" onClick={()=>onAddChild(node)}>＋子</button>
        <button className="icon-btn" onClick={()=>onEdit(node)}>✏️</button>
        <button className="icon-btn" onClick={()=>onDelete(node)}>🗑</button>
      </div>
      {node.children.length>0 &&
        <div className="cat-children">
          {node.children.map(ch=>
            <CategoryNode key={ch.id} node={ch} depth={depth+1} budgets={budgets}
              onAddChild={onAddChild} onEdit={onEdit} onDelete={onDelete} onBudget={onBudget} />
          )}
        </div>
      }
    </div>
  );
}

function CategoriesSection({categories, budgets, onAddCategory, onEditCategory, onDeleteCategory, onSetBudget}){
  const [catModal, setCatModal] = useState(null); // {mode:'add'|'edit', type, parentId, initial}
  const [budgetTarget, setBudgetTarget] = useState(null);

  const expenseTree = buildTree(categories.filter(c=>c.type==="expense"));
  const incomeTree = buildTree(categories.filter(c=>c.type==="income"));

  function handleDelete(node){
    if(node.children.length>0){ alert("請先刪除子分類"); return; }
    if(!confirm("確定刪除「"+node.name+"」？已使用此分類的交易仍會保留分類ID，但顯示會變成未分類。")) return;
    onDeleteCategory(node.id);
  }

  return (
    <div>
      <div className="cat-section">
        <div className="cat-section-title">
          <h3>支出分類</h3>
          <button onClick={()=>setCatModal({type:"expense", parentId:null})}>＋ 新增大分類</button>
        </div>
        {expenseTree.map(n=>
          <CategoryNode key={n.id} node={n} depth={0} budgets={budgets}
            onAddChild={(p)=>setCatModal({type:"expense", parentId:p.id})}
            onEdit={(c)=>setCatModal({type:"expense", parentId:c.parentId, initial:c})}
            onDelete={handleDelete}
            onBudget={(c)=>setBudgetTarget(c)} />
        )}
      </div>

      <div className="cat-section">
        <div className="cat-section-title">
          <h3>收入分類</h3>
          <button onClick={()=>setCatModal({type:"income", parentId:null})}>＋ 新增大分類</button>
        </div>
        {incomeTree.map(n=>
          <CategoryNode key={n.id} node={n} depth={0} budgets={budgets}
            onAddChild={(p)=>setCatModal({type:"income", parentId:p.id})}
            onEdit={(c)=>setCatModal({type:"income", parentId:c.parentId, initial:c})}
            onDelete={handleDelete}
            onBudget={()=>{}} />
        )}
      </div>

      {catModal &&
        <CategoryModal type={catModal.type} parentId={catModal.parentId} initial={catModal.initial}
          onClose={()=>setCatModal(null)}
          onSave={(data)=>{
            if(catModal.initial) onEditCategory(catModal.initial.id, data);
            else onAddCategory(data);
            setCatModal(null);
          }} />
      }
      {budgetTarget &&
        <BudgetModal category={budgetTarget}
          current={(budgets.find(b=>b.categoryId===budgetTarget.id)||{}).monthlyLimit}
          onClose={()=>setBudgetTarget(null)}
          onSave={(catId, limit)=>{ onSetBudget(catId, limit); setBudgetTarget(null); }} />
      }
    </div>
  );
}

function AccountRow({acc, transactions, dragHandlers, onEdit, onDelete}){
  const bal = accountBalance(acc, transactions);
  const neg = isLiability(acc.type) ? bal>0 : bal<0;
  return (
    <div className="acc-row">
      <span className="drag-handle" {...dragHandlers}>≡</span>
      <div className="acc-icon">
        {acc.iconImage ? <img src={acc.iconImage} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} /> : (acc.icon||"💰")}
      </div>
      <span className="name">{acc.name}</span>
      <span className={"bal"+(neg?" neg":"")}>{fmtMoney(Math.abs(bal))}</span>
      <button className="icon-btn" onClick={()=>onEdit(acc)}>✏️</button>
      <button className="icon-btn" onClick={()=>onDelete(acc)}>🗑</button>
    </div>
  );
}

function AccountsSection({accounts, transactions, onAddAccount, onEditAccount, onDeleteAccount, onReorderGroup}){
  const [modal, setModal] = useState(null); // {initial, defaultType}

  function handleDelete(acc){
    if(!confirm("確定刪除「"+acc.name+"」？已記錄在這個帳戶的交易仍會保留，但不再計入任何帳戶餘額。")) return;
    onDeleteAccount(acc.id);
  }

  return (
    <div>
      {ACCOUNT_TYPES.map(t=>{
        const group = accounts.filter(a=>a.type===t.key).sort((a,b)=>(a.order||0)-(b.order||0));
        return (
          <div className="acc-section" key={t.key}>
            <div className="acc-section-title">
              <h3>{t.icon} {t.label}</h3>
              <button onClick={()=>setModal({defaultType:t.key})}>＋ 新增{t.label}</button>
            </div>
            {group.length===0 && <div className="empty-hint">還沒有{t.label}帳戶</div>}
            <DragList items={group}
              onReorder={(newList)=>onReorderGroup(newList)}
              renderRow={(acc, dragHandlers)=>
                <AccountRow acc={acc} transactions={transactions} dragHandlers={dragHandlers}
                  onEdit={(a)=>setModal({initial:a})} onDelete={handleDelete} />
              } />
          </div>
        );
      })}

      {modal &&
        <AccountModal initial={modal.initial} defaultType={modal.defaultType}
          onClose={()=>setModal(null)}
          onSave={(data)=>{
            if(modal.initial) onEditAccount(modal.initial.id, data);
            else onAddAccount(data);
            setModal(null);
          }} />
      }
    </div>
  );
}

function InvestmentRow({inv, onEdit, onDelete}){
  const value = invMarketValue(inv);
  const gain = invGain(inv);
  const pct = invReturnPct(inv);
  const pos = gain>=0;
  return (
    <div className="inv-row">
      <div className="inv-top">
        <div><span className="inv-name">{inv.name}</span><span className="inv-code">{inv.symbol}</span></div>
        <span className={"inv-pct "+(pos?"pos":"neg")}>{pos?"+":""}{pct.toFixed(1)}%</span>
      </div>
      <div className="inv-mid">
        <span>{inv.shares} 股 × NT${inv.currentPrice}</span>
        <span>市值 {fmtMoney(value)}</span>
      </div>
      <div className="inv-bottom">
        <span className={"inv-gain "+(pos?"pos":"neg")}>{pos?"+":""}{fmtMoney(gain)}</span>
        <span className="inv-actions">
          <button onClick={()=>onEdit(inv)}>✏️</button>
          <button onClick={()=>onDelete(inv)}>🗑</button>
        </span>
      </div>
    </div>
  );
}

function InvestmentsSection({investments, onAddInvestment, onEditInvestment, onDeleteInvestment}){
  const [modal, setModal] = useState(null);
  function handleDelete(inv){
    if(!confirm("確定刪除「"+inv.name+"」這筆持股紀錄？")) return;
    onDeleteInvestment(inv.id);
  }
  return (
    <div>
      <div className="acc-section">
        <div className="acc-section-title">
          <h3>📈 持股</h3>
          <button onClick={()=>setModal({})}>＋ 新增持股</button>
        </div>
        {investments.length===0 && <div className="empty-hint">還沒有任何持股，先加一筆 0050 或 2330 試試</div>}
        {investments.slice().sort((a,b)=>a.symbol.localeCompare(b.symbol)).map(inv=>
          <InvestmentRow key={inv.id} inv={inv} onEdit={(i)=>setModal({initial:i})} onDelete={handleDelete} />
        )}
      </div>
      {modal &&
        <InvestmentModal initial={modal.initial}
          onClose={()=>setModal(null)}
          onSave={(data)=>{
            if(modal.initial) onEditInvestment(modal.initial.id, data);
            else onAddInvestment(data);
            setModal(null);
          }} />
      }
    </div>
  );
}

function SettingsTab({categories, budgets, accounts, transactions, investments,
  onAddCategory, onEditCategory, onDeleteCategory, onSetBudget,
  onAddAccount, onEditAccount, onDeleteAccount, onReorderGroup,
  onAddInvestment, onEditInvestment, onDeleteInvestment}){
  const [mode, setMode] = useState("category");

  const acctAssets = accounts.filter(a=>!isLiability(a.type)).reduce((s,a)=>s+accountBalance(a,transactions),0);
  const liabilities = accounts.filter(a=>isLiability(a.type)).reduce((s,a)=>s+accountBalance(a,transactions),0);
  const investAssets = investments.reduce((s,inv)=>s+invMarketValue(inv),0);
  const assets = acctAssets + investAssets;
  const netWorth = assets - liabilities;

  return (
    <div>
      {(mode==="account"||mode==="invest") &&
        <div className="networth-card">
          <div className="nw-label">淨資產</div>
          <div className="nw-value">{fmtMoney(netWorth)}</div>
          <div className="nw-split">
            <span>資產 <b>{fmtMoney(assets)}</b></span>
            <span>負債 <b>{fmtMoney(liabilities)}</b></span>
          </div>
        </div>
      }
      <div className="settings-mode-toggle">
        <button className={mode==="category"?"active":""} onClick={()=>setMode("category")}>分類</button>
        <button className={mode==="account"?"active":""} onClick={()=>setMode("account")}>帳戶</button>
        <button className={mode==="invest"?"active":""} onClick={()=>setMode("invest")}>投資</button>
      </div>
      {mode==="category" &&
        <CategoriesSection categories={categories} budgets={budgets}
          onAddCategory={onAddCategory} onEditCategory={onEditCategory} onDeleteCategory={onDeleteCategory} onSetBudget={onSetBudget} />
      }
      {mode==="account" &&
        <AccountsSection accounts={accounts} transactions={transactions}
          onAddAccount={onAddAccount} onEditAccount={onEditAccount} onDeleteAccount={onDeleteAccount} onReorderGroup={onReorderGroup} />
      }
      {mode==="invest" &&
        <InvestmentsSection investments={investments}
          onAddInvestment={onAddInvestment} onEditInvestment={onEditInvestment} onDeleteInvestment={onDeleteInvestment} />
      }
    </div>
  );
}

/* ---------- App ---------- */
function App(){
  const [categories, setCategories] = useState([]);
  const [transactions, setTransactions] = useState([]);
  const [budgets, setBudgets] = useState([]);
  const [accounts, setAccounts] = useState([]);
  const [investments, setInvestments] = useState([]);
  const [tab, setTab] = useState("overview");
  const [cursorMonth, setCursorMonth] = useState(()=>{const d=new Date(); d.setDate(1); return d;});
  const [cursorYear, setCursorYear] = useState(()=>new Date().getFullYear());
  const [showAdd, setShowAdd] = useState(false);
  const [editingTx, setEditingTx] = useState(null);
  const [presetDate, setPresetDate] = useState(null);
  const [msg, setMsg] = useState(null);
  const seeded = useRef(false);
  const seededAcc = useRef(false);

  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"categories"), snap=>{
      const list = snap.docs.map(d=>({id:d.id, ...d.data()}));
      setCategories(list);
      if(list.length===0 && !seeded.current){
        seeded.current = true;
        seedDefaultCategories();
      }
    });
    return unsub;
  }, []);

  useEffect(()=>{
    const unsub = onSnapshot(query(collection(db,"transactions"), orderBy("date","desc")), snap=>{
      setTransactions(snap.docs.map(d=>({id:d.id, ...d.data()})));
    });
    return unsub;
  }, []);

  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"budgets"), snap=>{
      setBudgets(snap.docs.map(d=>({id:d.id, ...d.data()})));
    });
    return unsub;
  }, []);

  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"accounts"), snap=>{
      const list = snap.docs.map(d=>({id:d.id, ...d.data()}));
      setAccounts(list);
      if(list.length===0 && !seededAcc.current){
        seededAcc.current = true;
        seedDefaultAccount();
      }
    });
    return unsub;
  }, []);

  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"investments"), snap=>{
      setInvestments(snap.docs.map(d=>({id:d.id, ...d.data()})));
    });
    return unsub;
  }, []);

  function flash(text){ setMsg(text); setTimeout(()=>setMsg(null), 1600); }

  function prevMonth(){ setCursorMonth(d=>{const nd=new Date(d); nd.setMonth(nd.getMonth()-1); return nd;}); }
  function nextMonth(){ setCursorMonth(d=>{const nd=new Date(d); nd.setMonth(nd.getMonth()+1); return nd;}); }

  const monthTx = useMemo(()=>{
    const key = monthKey(cursorMonth);
    return transactions.filter(t=>t.date && t.date.slice(0,7)===key);
  }, [transactions, cursorMonth]);

  async function saveTx(data){
    try{
      if(editingTx) await updateDoc(doc(db,"transactions",editingTx.id), data);
      else await addDoc(collection(db,"transactions"), data);
      setShowAdd(false); setEditingTx(null); setPresetDate(null);
      flash("已儲存");
    }catch(e){ alert("儲存失敗："+e.message); }
  }
  async function deleteTx(id){
    if(!confirm("確定刪除這筆交易？")) return;
    await deleteDoc(doc(db,"transactions",id));
    setShowAdd(false); setEditingTx(null);
    flash("已刪除");
  }
  async function addCategory(data){ await addDoc(collection(db,"categories"), {...data, color:PALETTE[categories.length%PALETTE.length]}); }
  async function editCategory(id, data){ await updateDoc(doc(db,"categories",id), data); }
  async function deleteCategory(id){
    await deleteDoc(doc(db,"categories",id));
    const b = budgets.find(b=>b.categoryId===id);
    if(b) await deleteDoc(doc(db,"budgets",b.id));
  }
  async function setBudget(categoryId, limit){
    const existing = budgets.find(b=>b.categoryId===categoryId);
    if(limit===null){
      if(existing) await deleteDoc(doc(db,"budgets",existing.id));
      return;
    }
    if(existing) await updateDoc(doc(db,"budgets",existing.id), {monthlyLimit:limit});
    else await addDoc(collection(db,"budgets"), {categoryId, monthlyLimit:limit});
  }

  async function addAccount(data){
    const sameType = accounts.filter(a=>a.type===data.type);
    const maxOrder = sameType.reduce((m,a)=>Math.max(m, a.order||0), -1);
    await addDoc(collection(db,"accounts"), {...data, order:maxOrder+1});
  }
  async function editAccount(id, data){ await updateDoc(doc(db,"accounts",id), data); }
  async function deleteAccount(id){ await deleteDoc(doc(db,"accounts",id)); }
  async function reorderAccountGroup(newList){
    const batch = writeBatch(db);
    newList.forEach((acc, i)=>{ batch.update(doc(db,"accounts",acc.id), {order:i}); });
    await batch.commit();
  }

  async function addInvestment(data){ await addDoc(collection(db,"investments"), data); }
  async function editInvestment(id, data){ await updateDoc(doc(db,"investments",id), data); }
  async function deleteInvestment(id){ await deleteDoc(doc(db,"investments",id)); }

  const showMonthHeader = tab==="overview" || tab==="calendar";

  return (
    <div className="app">
      <div className="header"><h1>我的資產</h1></div>
      {showMonthHeader && <MonthSwitcher date={cursorMonth} onPrev={prevMonth} onNext={nextMonth} />}

      <div className="content">
        {tab==="overview" &&
          <OverviewTab categories={categories} monthTx={monthTx} budgets={budgets}
            onEditTx={(t)=>{setEditingTx(t); setShowAdd(true);}} />
        }
        {tab==="calendar" &&
          <CalendarTab categories={categories} monthTx={monthTx} cursorMonth={cursorMonth}
            onAddOnDate={(ds)=>{setPresetDate(ds); setEditingTx(null); setShowAdd(true);}}
            onEditTx={(t)=>{setEditingTx(t); setShowAdd(true);}} />
        }
        {tab==="analysis" &&
          <AnalysisTab categories={categories} transactions={transactions} cursorMonth={cursorMonth} cursorYear={cursorYear} />
        }
        {tab==="settings" &&
          <SettingsTab categories={categories} budgets={budgets} accounts={accounts} transactions={transactions} investments={investments}
            onAddCategory={addCategory} onEditCategory={editCategory} onDeleteCategory={deleteCategory}
            onSetBudget={setBudget}
            onAddAccount={addAccount} onEditAccount={editAccount} onDeleteAccount={deleteAccount}
            onReorderGroup={reorderAccountGroup}
            onAddInvestment={addInvestment} onEditInvestment={editInvestment} onDeleteInvestment={deleteInvestment} />
        }
      </div>

      {(tab==="overview"||tab==="calendar") &&
        <button className="fab" onClick={()=>{setEditingTx(null); setPresetDate(null); setShowAdd(true);}}>＋</button>
      }

      <BottomNav tab={tab} setTab={setTab} />

      {showAdd &&
        <AddTxModal categories={categories} accounts={accounts}
          initial={editingTx ? editingTx : (presetDate? {date:presetDate} : null)}
          onSave={saveTx} onDelete={deleteTx}
          onClose={()=>{setShowAdd(false); setEditingTx(null); setPresetDate(null);}} />
      }
      {msg && <div className="top-msg">{msg}</div>}
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
