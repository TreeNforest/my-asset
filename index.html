          }}>儲存</button>
        </div>
      </div>
    </div>
  );
}

/* ---------- 主分頁 ---------- */
function StatsFullPage({categories, accounts, allMonthTx, defaultViewType, onClose}){
  const [periodMode, setPeriodMode] = useState("month");
  const [cursorMonth, setCursorMonth] = useState(()=>{const d=new Date();d.setDate(1);return d;});
  const [customStart, setCustomStart] = useState(()=>{const d=new Date();d.setDate(1);return toDateStr(d);});
  const [customEnd, setCustomEnd] = useState(()=>toDateStr(new Date()));
  const [viewType, setViewType] = useState(defaultViewType||"expense");
  const [selectedCat, setSelectedCat] = useState(null);

  // 用 allMonthTx 是從 App 傳入的，但這裡要獨立篩選所有交易
  // 注意：allMonthTx只是本月資料，我們需要從父層拿全部transactions
  // 改由 App 透過 allTx 傳入；暫用 allMonthTx 作為全部可用資料
  const tx = useMemo(()=>{
    if(periodMode==="month"){
      const key = cursorMonth.getFullYear()+"-"+pad(cursorMonth.getMonth()+1);
      return allMonthTx.filter(t=>t.date.slice(0,7)===key);
    }
    if(customEnd<customStart) return [];
    return allMonthTx.filter(t=>t.date>=customStart && t.date<=customEnd);
  }, [allMonthTx, periodMode, cursorMonth, customStart, customEnd]);

  const catData = useMemo(()=>{
    const map = {};
    tx.filter(t=>t.type===viewType).forEach(t=>{
      const cat = catById(categories, t.categoryId);
      const root = cat&&cat.parentId ? catById(categories,cat.parentId) : cat;
      const name = root?root.name:(cat?cat.name:"未分類");
      const color = root?root.color:(cat?cat.color:"#ccc");
      if(!map[name]) map[name]={name,color,value:0};
      map[name].value += t.amount;
    });
    const list = Object.values(map).sort((a,b)=>b.value-a.value);
    const total = list.reduce((s,e)=>s+e.value,0);
    list.forEach(e=>{e.pct=total>0?Math.round(e.value/total*1000)/10:0;});
    return list;
  }, [tx, viewType, categories]);

  const totalIncome = tx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalExpense = tx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);

  const accStats = useMemo(()=>{
    return accounts.filter(a=>!isExcluded(a)).map(acc=>{
      const atx = tx.filter(t=>t.accountId===acc.id);
      const income = atx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
      const expense = atx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
      return {acc,income,expense,balance:income-expense};
    }).filter(r=>r.income>0||r.expense>0);
  }, [tx, accounts]);

  const counterpartStats = useMemo(()=>{
    const map = {};
    tx.filter(t=>t.counterpart && (t.type==="expense"||t.type==="income")).forEach(t=>{
      const k = t.counterpart.trim();
      if(!map[k]) map[k]={name:k,expense:0,income:0};
      if(t.type==="expense") map[k].expense += t.amount;
      else map[k].income += t.amount;
    });
    return Object.values(map).sort((a,b)=>(b.expense+b.income)-(a.expense+a.income));
  }, [tx]);

  // 選中的大分類 → 計算子分類資料
  const subCatData = useMemo(()=>{
    if(!selectedCat) return [];
    const map = {};
    tx.filter(t=>t.type===viewType).forEach(t=>{
      const cat = catById(categories, t.categoryId);
      if(!cat) return;
      const root = cat.parentId ? catById(categories, cat.parentId) : cat;
      const rootName = root ? root.name : cat.name;
      if(rootName !== selectedCat) return;
      const subName = cat.parentId ? cat.name : "(未細分)";
      const subColor = cat.color || root.color || "#ccc";
      if(!map[subName]) map[subName]={name:subName, color:subColor, value:0};
      map[subName].value += t.amount;
    });
    const list = Object.values(map).sort((a,b)=>b.value-a.value);
    const total = list.reduce((s,e)=>s+e.value,0);
    list.forEach(e=>{e.pct=total>0?Math.round(e.value/total*1000)/10:0;});
    return list;
  }, [selectedCat, tx, viewType, categories]);

  function prevMonth(){setCursorMonth(d=>{const n=new Date(d);n.setMonth(n.getMonth()-1);return n;});}
  function nextMonth(){setCursorMonth(d=>{const n=new Date(d);n.setMonth(n.getMonth()+1);return n;});}
  const periodLabel = periodMode==="month" ? fmtMonthLabel(cursorMonth) : customStart.slice(0,7)+" ～ "+customEnd.slice(0,7);

  return (
    <div className="sfp-body">
      {/* 時間模式 */}
      <div className="sfp-period-tabs">
        {["month","custom"].map(m=>(
          <button key={m} className={periodMode===m?"active":""} onClick={()=>setPeriodMode(m)}>
            {m==="month"?"月份":"自訂"}
          </button>
        ))}
      </div>

      {periodMode==="month" &&
        <div className="month-switcher" style={{paddingBottom:12}}>
          <button onClick={prevMonth}>‹</button>
          <span className="label">{fmtMonthLabel(cursorMonth)}</span>
          <button onClick={nextMonth}>›</button>
        </div>
      }
      {periodMode==="custom" &&
        <div className="date-range-row" style={{marginBottom:12}}>
          <input type="month" value={customStart.slice(0,7)} onChange={e=>setCustomStart(e.target.value+"-01")} />
          <span>～</span>
          <input type="month" value={customEnd.slice(0,7)} onChange={e=>{const d=new Date(e.target.value+"-01");d.setMonth(d.getMonth()+1);d.setDate(0);setCustomEnd(toDateStr(d));}} />
        </div>
      }

      {/* 支出/收入切換 */}
      <div className="sfp-type-tabs">
        {["expense","income"].map(t=>(
          <button key={t} className={viewType===t?"active":""} onClick={()=>setViewType(t)}>
            {t==="expense"?"支出":"收入"}
          </button>
        ))}
      </div>

      {/* 圓環 or 橫條圖 */}
      <div className="sfp-section">
        {catData.length===0
          ? <div className="empty-hint">沒有{viewType==="expense"?"支出":"收入"}紀錄</div>
          : selectedCat && subCatData.length>0
            ?
            <React.Fragment>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontSize:16,fontWeight:600}}>{selectedCat}</span>
                <button onClick={()=>setSelectedCat(null)}
                  style={{background:"none",border:"none",color:"var(--accent)",fontSize:13,fontWeight:600,padding:"2px 6px"}}>
                  ← 全部分類
                </button>
              </div>
              <div className="hbar-section">
                {subCatData.map((s,i)=>(
                  <div className="hbar-row" key={i}>
                    <span className="hbar-name">{s.name}</span>
                    <div className="hbar-track">
                      <div className="hbar-fill" style={{width:s.pct+"%",background:s.color}}></div>
                    </div>
                    <span className="hbar-pct">{s.pct}%</span>
                    <span className="hbar-amt">{fmtMoney(s.value)}</span>
                  </div>
                ))}
              </div>
            </React.Fragment>
            :
            <React.Fragment>
              <div className="sfp-donut-section">
                <Donut data={catData.map(e=>({...e,id:e.name}))} size={180} label={viewType==="expense"?"支出":"收入"} />
                <div style={{textAlign:"center",fontSize:12,color:"var(--ink-soft)",marginTop:6}}>
                  總計 {fmtMoney(catData.reduce((s,e)=>s+e.value,0))}
                </div>
              </div>
              <div className="sfp-cat-list">
                {catData.map((e,i)=>{
                  const hasChildren = categories.some(c=>c.parentId && c.type===viewType && (()=>{
                    const root = catById(categories,c.parentId);
                    return root && root.name===e.name;
                  })());
                  const isSelected = selectedCat===e.name;
                  return (
                    <React.Fragment key={i}>
                      <div
                        className={"sfp-cat-row"+(hasChildren?" clickable":"")+(isSelected?" selected":"")}
                        onClick={hasChildren?()=>setSelectedCat(isSelected?null:e.name):undefined}>
                        <div className="sfp-cat-dot" style={{background:e.color}}></div>
                        <span className="sfp-cat-name">{e.name}</span>
                        <span className="sfp-cat-pct">{e.pct}%</span>
                        <span className="sfp-cat-amt">{fmtMoney(e.value)}</span>
                        {hasChildren
                          ? <span className={"sfp-expand-arrow"+(isSelected?" open":"")}>▶</span>
                          : <span className="sfp-arrow-spacer"></span>
                        }
                      </div>
                    </React.Fragment>
                  );
                })}
              </div>
            </React.Fragment>
        }
      </div>

      {/* 總覽 */}
      <div className="sfp-section">
        <h3>總覽</h3>
        <div className="sfp-stat-row">
          <div className="s"><span>筆數</span><b>{tx.filter(t=>t.type!=="transfer").length}</b></div>
          <div className="s"><span>收入</span><b style={{color:"var(--income)"}}>{fmtMoney(totalIncome)}</b></div>
          <div className="s"><span>支出</span><b style={{color:"var(--expense)"}}>{fmtMoney(totalExpense)}</b></div>
          <div className="s"><span>結餘</span><b>{fmtMoney(totalIncome-totalExpense)}</b></div>
        </div>
      </div>

      {/* 帳戶 */}
      {accStats.length>0 &&
        <div className="sfp-section">
          <h3>帳戶<span style={{fontSize:12,fontWeight:400,marginLeft:8,color:"var(--ink-soft)"}}>不含轉帳</span></h3>
          <table className="stats-table">
            <thead><tr><th>名稱</th><th>收入</th><th>支出</th><th>結餘</th></tr></thead>
            <tbody>
              {accStats.map(({acc,income,expense,balance})=>(
                <tr key={acc.id}>
                  <td>
                    <span className="acc-icon-sm">
                      {acc.iconImage?<img src={acc.iconImage} alt=""/>:renderCatIcon(acc.icon||"💰",20)}
                    </span>
                    {acc.name.length>5?acc.name.slice(0,5)+"…":acc.name}
                  </td>
                  <td style={{color:"var(--income)"}}>{income>0?fmtMoney(income):"—"}</td>
                  <td style={{color:"var(--expense)"}}>{expense>0?fmtMoney(expense):"—"}</td>
                  <td style={{fontWeight:700,color:balance>=0?"var(--income)":"var(--expense)"}}>{fmtMoney(balance)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      }

      {counterpartStats.length>0 &&
        <div className="sfp-section">
          <h3>付給／收自</h3>
          <table className="stats-table">
            <thead><tr><th>對象</th><th>收入</th><th>支出</th></tr></thead>
            <tbody>
              {counterpartStats.map((r,i)=>(
                <tr key={i}>
                  <td style={{fontWeight:600}}>{r.name}</td>
                  <td style={{color:"var(--income)"}}>{r.income>0?fmtMoney(r.income):"—"}</td>
                  <td style={{color:"var(--expense)"}}>{r.expense>0?fmtMoney(r.expense):"—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      }
    </div>
  );
}

function SpendingAnalysisCard({categories, accounts, monthTx, allTx, periodLabel}){
  const [viewType, setViewType] = useState("expense");
  const [showPie, setShowPie] = useState(false);
  const label = periodLabel||"本月";

  const catData = useMemo(()=>{
    const map = {};
    monthTx.filter(t=>t.type===viewType).forEach(t=>{
      if(!map[t.categoryId]) map[t.categoryId]=0;
      map[t.categoryId] += t.amount;
    });
    const entries = Object.entries(map).map(([id,val])=>{
      const cat = catById(categories, id);
      const rootCat = cat && cat.parentId ? catById(categories, cat.parentId) : cat;
      return {id, value:val, name:rootCat?rootCat.name:(cat?cat.name:"未分類"), color:rootCat?rootCat.color:(cat?cat.color:"#ccc")};
    }).sort((a,b)=>b.value-a.value);
    const merged = {};
    entries.forEach(e=>{
      if(!merged[e.name]) merged[e.name]={name:e.name,color:e.color,value:0};
      merged[e.name].value += e.value;
    });
    const list = Object.values(merged).sort((a,b)=>b.value-a.value);
    const realTotal = list.reduce((s,e)=>s+e.value,0);
    list.forEach(e=>{ e.pct = realTotal>0?Math.round(e.value/realTotal*1000)/10:0; });
    if(list.length>5){
      const top = list.slice(0,5);
      const rest = list.slice(5).reduce((s,e)=>s+e.value,0);
      top.push({name:"其他",color:"#B8AFA2",value:rest,pct:realTotal>0?Math.round(rest/realTotal*1000)/10:0});
      return top;
    }
    return list;
  }, [monthTx, viewType, categories]);

  const total = catData.reduce((s,e)=>s+e.value,0);

  // 帳戶統計（不含轉帳）
  const accStats = useMemo(()=>{
    return accounts.filter(a=>!isExcluded(a)).map(acc=>{
      const tx = monthTx.filter(t=>t.accountId===acc.id);
      const income = tx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
      const expense = tx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
      return {acc, income, expense, balance: income-expense};
    }).filter(r=>r.income>0||r.expense>0);
  }, [monthTx, accounts]);

  const totalIncome = monthTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalExpense = monthTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);

  return (
    <div className="chart-card">
      <div className="analysis-header">
        <h3 style={{margin:0}}>{label}{viewType==="expense"?"支出":"收入"}分析</h3>
        <div className="analysis-btns">
          <button className="analysis-btn" onClick={()=>setViewType(v=>v==="expense"?"income":"expense")}>
            <i className="ph ph-arrows-left-right"></i>
          </button>
          <button className="analysis-btn" onClick={()=>setShowPie(true)}>
            <i className="ph ph-chart-pie"></i>
          </button>
        </div>
      </div>

      {total===0 ? <div className="empty-hint">這段時間沒有{viewType==="expense"?"支出":"收入"}紀錄</div> :
        <React.Fragment>
          <div className="spending-bar">
            {catData.map((e,i)=>(
              <div key={i} className="spending-bar-seg" style={{flex:e.value, background:e.color}} />
            ))}
          </div>
          {catData.map((e,i)=>(
            <div className="spending-row" key={i}>
              <div className="spending-dot" style={{background:e.color}}></div>
              <div className="spending-name">{e.name}</div>
              <span className="spending-pct">{e.pct}%</span>
              <span className="spending-amt">{fmtMoney(e.value)}</span>
            </div>
          ))}
        </React.Fragment>
      }

      {showPie &&
        <div className="stats-fullpage">
          <div className="sfp-header">
            <h2>統計</h2>
            <button className="detail-close-x" style={{fontSize:20}} onClick={()=>setShowPie(false)}>✕</button>
          </div>
          <StatsFullPage categories={categories} accounts={accounts} allMonthTx={allTx||monthTx}
            defaultViewType={viewType} onClose={()=>setShowPie(false)} />
        </div>
      }
    </div>
  );
}

function OverviewTab({categories, accounts, monthTx, allTx, periodLabel, onViewTx, onAdd}){
  const label = periodLabel || "本月";
  const [query, setQuery] = useState("");
  const isSearching = query.trim().length > 0;

  const income = monthTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense = monthTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;

  const searchResults = useMemo(()=>{
    if(!isSearching) return [];
    const q = query.trim().toLowerCase();
    const pool = allTx || monthTx;
    return pool.filter(t=>{
      const cat = catById(categories, t.categoryId);
      const acc = t.type==="transfer"
        ? (catById(accounts, t.fromAccountId)||{name:""}).name + " " + (catById(accounts, t.toAccountId)||{name:""}).name
        : (catById(accounts, t.accountId)||{name:""}).name;
      const catName = cat ? cat.name : "";
      const note = t.note || "";
      const amt = String(Math.round(t.amount));
      return catName.toLowerCase().includes(q) || acc.toLowerCase().includes(q) ||
             note.toLowerCase().includes(q) || amt.includes(q) ||
             (t.counterpart||"").toLowerCase().includes(q);
    }).slice().sort((a,b)=>b.date.localeCompare(a.date)||(b.createdAt||0)-(a.createdAt||0));
  }, [query, allTx, monthTx, categories, accounts]);

  const dayGroups = useMemo(()=> isSearching ? [] : groupByDate(monthTx), [monthTx, isSearching]);
  const searchGroups = useMemo(()=> isSearching ? groupByDate(searchResults) : [], [searchResults, isSearching]);

  return (
    <div>
      <div className="summary-cards">
        <div className="summary-card income"><div className="label">{label}收入</div><div className="value">{fmtMoney(income)}</div></div>
        <div className="summary-card expense"><div className="label">{label}支出</div><div className="value">{fmtMoney(expense)}</div></div>
        <div className="summary-card"><div className="label">{label}結餘</div><div className="value">{fmtMoney(balance)}</div></div>
      </div>

      <div className="search-bar-wrap">
        <span className="search-icon">🔍</span>
        <input type="text" value={query} onChange={e=>setQuery(e.target.value)}
          placeholder="搜尋分類、帳戶、備註或金額…" />
        {query && <button className="search-clear" onClick={()=>setQuery("")}>✕</button>}
      </div>

      {isSearching ?
        <React.Fragment>
          <div className="section-title">搜尋結果（{searchResults.length} 筆）</div>
          {searchResults.length===0 && <div className="empty-hint">找不到符合的交易</div>}
          {searchGroups.map(g=>
            <React.Fragment key={g.date}>
              <div className="day-group-header">{formatDayLabel(g.date)}</div>
              {g.items.map(t=>
                <TxRow key={t.id} t={t} categories={categories} accounts={accounts} onClick={()=>onViewTx(t)} />
              )}
            </React.Fragment>
          )}
        </React.Fragment>
        :
        <React.Fragment>
          <SpendingAnalysisCard categories={categories} accounts={accounts} monthTx={monthTx} allTx={allTx} periodLabel={label} />
          <div className="section-title">{label}交易</div>
          {dayGroups.length===0 && <div className="empty-hint">這段時間還沒有任何紀錄，點右下角「＋」新增一筆吧</div>}
          {dayGroups.map(g=>
            <React.Fragment key={g.date}>
              <div className="day-group-header">{formatDayLabel(g.date)}</div>
              {g.items.map(t=>
                <TxRow key={t.id} t={t} categories={categories} accounts={accounts} onClick={()=>onViewTx(t)} />
              )}
            </React.Fragment>
          )}
        </React.Fragment>
      }
    </div>
  );
}

function CalendarTab({categories, accounts, monthTx, cursorMonth, onAddOnDate, onViewTx}){
  const [activeDay, setActiveDay] = useState(null);
  const dim = daysInMonth(cursorMonth);
  const firstDow = new Date(cursorMonth.getFullYear(), cursorMonth.getMonth(), 1).getDay();
  const todayStr = toDateStr(new Date());
  const cells = [];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(d);

  function txOnDay(d){
    const ds = cursorMonth.getFullYear()+"-"+pad(cursorMonth.getMonth()+1)+"-"+pad(d);
    return monthTx.filter(t=>t.date===ds).slice().sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  }

  const dayList = activeDay? txOnDay(activeDay) : [];
  const activeDs = activeDay? cursorMonth.getFullYear()+"-"+pad(cursorMonth.getMonth()+1)+"-"+pad(activeDay) : null;

  // 每日趨勢圖資料
  const dailyData = useMemo(()=>{
    const key = cursorMonth.getFullYear()+"-"+pad(cursorMonth.getMonth()+1);
    const days = [];
    for(let d=1;d<=dim;d++){
      const ds = key+"-"+pad(d);
      const dayTx = monthTx.filter(t=>t.date===ds);
      const income = dayTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
      const expense = dayTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
      days.push({d, net: income - expense, income, expense});
    }
    return days;
  }, [monthTx, cursorMonth, dim]);

  const hasAnyData = dailyData.some(d=>d.income>0||d.expense>0);
  const BAR_W = 7, GAP = 3;
  const chartH = 120, PL = 54, PT = 12, PB = 22;
  const allNets = dailyData.map(d=>d.net);
  const rawMax = Math.max(0, ...allNets);
  const rawMin = Math.min(0, ...allNets);
  const yMax = niceMax(rawMax) || 1000;
  const yMin = rawMin < 0 ? -niceMax(Math.abs(rawMin)) : 0;
  const yRange = yMax - yMin;
  function yPos(v){ return PT + chartH - ((v-yMin)/yRange)*chartH; }
  const zeroY = yPos(0);
  const totalW = PL + dailyData.length*(BAR_W+GAP) + 8;

  return (
    <div>
      <div className="calendar-grid">
        {["日","一","二","三","四","五","六"].map(w=><div className="cal-dow" key={w}>{w}</div>)}
        {cells.map((d,i)=>{
          if(d===null) return <div className="cal-cell empty" key={i}></div>;
          const ds = cursorMonth.getFullYear()+"-"+pad(cursorMonth.getMonth()+1)+"-"+pad(d);
          const dayTx = txOnDay(d);
          const incomeSum = dayTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
          const expenseSum = dayTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
          return (
            <div key={i} className={"cal-cell"+(ds===todayStr?" today":"")} onClick={()=>setActiveDay(d)}>
              <span className="cal-day-num">{d}</span>
              {incomeSum>0 && <span className="cal-num income">{Math.round(incomeSum)}</span>}
              {expenseSum>0 && <span className="cal-num expense">{Math.round(expenseSum)}</span>}
            </div>
          );
        })}
      </div>

      {hasAnyData &&
        <div className="chart-card" style={{marginTop:14}}>
          <h3>每日收支淨額</h3>
          <div className="chart-scroll-wrap">
            <svg width={totalW} height={chartH+PT+PB} style={{display:"block",overflow:"visible",fontFamily:"inherit"}}>
              {/* Y軸格線 */}
              {[yMin, (yMin+yMax)/2, yMax].filter((v,i,a)=>a.indexOf(v)===i).map((v,i)=>(
                <g key={i}>
                  <line x1={PL} y1={yPos(v)} x2={totalW} y2={yPos(v)}
                    stroke="var(--line)" strokeDasharray="3,3" strokeWidth={1}/>
                  <text x={PL-4} y={yPos(v)+4} textAnchor="end" fontSize={9} fill="var(--ink-soft)">
                    {Math.round(v).toLocaleString("zh-Hant-TW")}
                  </text>
                </g>
              ))}
              {/* 零線 */}
              <line x1={PL} y1={zeroY} x2={totalW} y2={zeroY}
                stroke="var(--ink-soft)" strokeWidth={1} />
              {/* 長條 */}
              {dailyData.map(({d, net},i)=>{
                const x = PL + i*(BAR_W+GAP);
                const barTop = yPos(Math.max(0,net));
                const barBot = yPos(Math.min(0,net));
                const barH = Math.max(1, barBot - barTop);
                const color = net>=0 ? "var(--income)" : "var(--expense)";
                return (
                  <g key={i} onClick={()=>setActiveDay(d)} style={{cursor:"pointer"}}>
                    <rect x={x} y={barTop} width={BAR_W} height={barH}
                      fill={color} opacity={activeDay===d?1:0.8} rx={2}/>
                  </g>
                );
              })}
              {/* X軸標籤（每5天） */}
              {dailyData.map(({d},i)=>{
                if(d!==1 && d%5!==0) return null;
                const x = PL + i*(BAR_W+GAP) + BAR_W/2;
                return (
                  <text key={i} x={x} y={chartH+PT+PB-4} textAnchor="middle"
                    fontSize={9} fill="var(--ink-soft)">{d}</text>
                );
              })}
            </svg>
          </div>
          {activeDay &&
            <div className="chart-detail">
              <span className="lbl">{cursorMonth.getMonth()+1}月{activeDay}日</span>
              <span>
                收入 <b style={{color:"var(--income)"}}>{fmtMoney(dailyData[activeDay-1]?.income||0)}</b>　
                支出 <b style={{color:"var(--expense)"}}>{fmtMoney(dailyData[activeDay-1]?.expense||0)}</b>
              </span>
            </div>
          }
        </div>
      }

      {activeDay &&
        <div className="sheet-overlay" onClick={()=>setActiveDay(null)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"></div>
            <h2>{cursorMonth.getMonth()+1}月{activeDay}日</h2>
            {dayList.length===0 && <div className="empty-hint">這天還沒有紀錄</div>}
            {dayList.map(t=>
              <TxRow key={t.id} t={t} categories={categories} accounts={accounts}
                onClick={()=>{setActiveDay(null); onViewTx(t);}} />
            )}
            <div className="btn-row">
              <button className="btn ghost" onClick={()=>setActiveDay(null)}>關閉</button>
              <button className="btn primary" onClick={()=>{onAddOnDate(activeDs); setActiveDay(null);}}>＋ 在這天新增</button>
            </div>
          </div>
        </div>
      }
    </div>
  );
}

function LineChart({series}){
  const W = 340, H = 200, PL = 62, PB = 52, PR = 10, PT = 14;
  const chartW = W - PL - PR;
  const chartH = H - PT - PB;
  const n = series[0] ? series[0].values.length : 0;
  if(n===0) return <div className="empty-hint">還沒有資料</div>;

  const allVals = series.flatMap(s=>s.values).filter(v=>isFinite(v));
  const rawMin = Math.min(...allVals);
  const rawMax = Math.max(...allVals);
  const pad2 = (rawMax - rawMin) * 0.12 || Math.abs(rawMax)*0.05 || 1000;
  const yMin = rawMin - pad2;
  const yMax = rawMax + pad2;
  const yRange = yMax - yMin;

  function xPos(i){ return PL + (n===1 ? chartW/2 : i/(n-1)*chartW); }
  function yPos(v){ return PT + chartH - ((v-yMin)/yRange)*chartH; }

  const gridStep = niceMax((rawMax-rawMin)/3) || niceMax(rawMax/4);
  const gridBase = Math.floor(rawMin/gridStep)*gridStep;
  const gridVals = [];
  for(let v=gridBase; v<=rawMax+gridStep*0.01; v+=gridStep){
    if(v>=yMin && v<=yMax) gridVals.push(v);
  }

  const labels = series[0].labels || [];
  const labelStep = n<=10 ? 1 : Math.ceil(n/10);

  return (
    <div className="chart-scroll-wrap">
      <svg width={Math.max(W, n*28+PL+PR)} height={H+PB} style={{display:"block",overflow:"visible",fontFamily:"inherit"}}>
        {gridVals.map((v,i)=>{
          const y = yPos(v);
          return (
            <g key={i}>
              <line x1={PL} y1={y} x2={W-PR} y2={y} stroke="var(--line)" strokeDasharray="4,3" strokeWidth={1}/>
              <text x={PL-6} y={y+4} textAnchor="end" fontSize={10} fill="var(--ink-soft)">
                {Math.round(v).toLocaleString("zh-Hant-TW")}
              </text>
            </g>
          );
        })}
        <line x1={PL} y1={PT+chartH} x2={W-PR} y2={PT+chartH} stroke="var(--line)" strokeWidth={1}/>
        {series.map((s,si)=>{
          const pts = s.values.map((v,i)=>`${xPos(i)},${yPos(v)}`).join(" ");
          return (
            <g key={si}>
              <polyline points={pts} fill="none" stroke={s.color} strokeWidth={2.5}
                strokeLinejoin="round" strokeLinecap="round"/>
              {s.values.map((v,i)=>(
                <circle key={i} cx={xPos(i)} cy={yPos(v)} r={3.5} fill={s.color} />
              ))}
            </g>
          );
        })}
        {labels.map((lb,i)=>{
          if(i%labelStep!==0 && i!==n-1) return null;
          const x = xPos(i);
          const y0 = PT + chartH + 8;
          return (
            <text key={i} x={x} y={y0} textAnchor="end" fontSize={10} fill="var(--ink-soft)"
              transform={`rotate(-60,${x},${y0})`}>
              {lb}
            </text>
          );
        })}
      </svg>
    </div>
  );
}

function AnalysisTab({categories, transactions, accounts, investments}){
  const [nwMode, setNwMode] = useState("month");
  const [view, setView] = useState("networth");
  const [periodStart, setPeriodStart] = useState(()=>{
    const d=new Date(); d.setMonth(d.getMonth()-11); d.setDate(1); return toDateStr(d);
  });
  const [periodEnd, setPeriodEnd] = useState(()=>toDateStr(new Date()));
  const [showPeriodSheet, setShowPeriodSheet] = useState(false);

  const todayStr = toDateStr(new Date());
  /* 截至某日的持股價值：
     過去月份沒有當時的歷史股價，用「買進成本」計價；
     已到今天的時間點才用目前市價，差額就是未實現損益。 */
  function investValueAt(upTo){
    const useMarket = upTo >= todayStr;
    return (investments||[]).reduce((sum, inv)=>{
      const lots = invLots(inv).filter(l=>(l.date||"") <= upTo);
      if(!lots.length) return sum;
      if(useMarket){
        const sh = lots.reduce((s,l)=>s+(+l.shares||0),0);
        return sum + sh*(+inv.currentPrice||0);
      }
      return sum + lots.reduce((s,l)=>s+lotCost(l),0);
    }, 0);
  }

  function calcNetWorth(txUpTo, upToDate){
    let assets=0, liabilities=0;
    accounts.filter(a=>!isExcluded(a)).forEach(acc=>{
      const bal = accountBalance(acc, txUpTo);
      if(isLiability(acc.type)) liabilities += Math.max(0,bal);
      else assets += bal;
    });
    return assets + investValueAt(upToDate) - liabilities;
  }

  const networthSeries = useMemo(()=>{
    let labels=[], values=[];
    if(nwMode==="month"){
      const today=new Date();
      for(let i=11;i>=0;i--){
        const d=new Date(today.getFullYear(),today.getMonth()-i,1);
        const key=d.getFullYear()+"-"+pad(d.getMonth()+1);
        labels.push((d.getFullYear()%100)+"年"+(d.getMonth()+1)+"月");
        values.push(calcNetWorth(transactions.filter(t=>t.date<=key+"-31"), key+"-31"));
      }
    } else if(nwMode==="year"){
      const allYears=[...new Set(transactions.map(t=>t.date.slice(0,4)))].sort();
      const thisYear=String(new Date().getFullYear());
      if(!allYears.includes(thisYear)) allYears.push(thisYear);
      allYears.forEach(y=>{
        const endDate = y===thisYear ? toDateStr(new Date()) : y+"-12-31";
        labels.push(y+"年");
        values.push(calcNetWorth(transactions.filter(t=>t.date<=endDate), endDate));
      });
    } else {
      const startD = fromDateStr(periodStart);
      const endD = fromDateStr(periodEnd);
      if(startD<=endD){
        let cur = new Date(startD.getFullYear(), startD.getMonth(), 1);
        while(cur<=endD){
          const key=cur.getFullYear()+"-"+pad(cur.getMonth()+1);
          labels.push((cur.getFullYear()%100)+"年"+(cur.getMonth()+1)+"月");
          values.push(calcNetWorth(transactions.filter(t=>t.date<=key+"-31"), key+"-31"));
          cur=new Date(cur.getFullYear(), cur.getMonth()+1, 1);
        }
      }
    }
    return [{label:"淨資產", color:"var(--income)", values, labels}];
  }, [nwMode, transactions, accounts, investments, periodStart, periodEnd]);

  const cashflowSeries = useMemo(()=>{
    const today=new Date();
    const income=[], expense=[], labels=[];
    for(let i=11;i>=0;i--){
      const d=new Date(today.getFullYear(),today.getMonth()-i,1);
      const key=d.getFullYear()+"-"+pad(d.getMonth()+1);
      const tx=transactions.filter(t=>t.date.slice(0,7)===key);
      income.push(tx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0));
      expense.push(tx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0));
      labels.push((d.getFullYear()%100)+"年"+(d.getMonth()+1)+"月");
    }
    return [
      {label:"收入", color:"var(--income)", values:income, labels},
      {label:"支出", color:"var(--expense)", values:expense, labels},
    ];
  }, [transactions]);

  const lastNW = networthSeries[0].values[networthSeries[0].values.length-1]||0;
  const firstNW = networthSeries[0].values[0]||0;
  const nwChange = lastNW - firstNW;
  const lastIncome = cashflowSeries[0].values[cashflowSeries[0].values.length-1]||0;
  const lastExpense = cashflowSeries[1].values[cashflowSeries[1].values.length-1]||0;

  const periodPresets = [
    {label:"過去3個月", fn:()=>{ const d=new Date(); d.setMonth(d.getMonth()-2); d.setDate(1); setPeriodStart(toDateStr(d)); setPeriodEnd(toDateStr(new Date())); }},
    {label:"過去6個月", fn:()=>{ const d=new Date(); d.setMonth(d.getMonth()-5); d.setDate(1); setPeriodStart(toDateStr(d)); setPeriodEnd(toDateStr(new Date())); }},
    {label:"過去1年",   fn:()=>{ const d=new Date(); d.setFullYear(d.getFullYear()-1); d.setDate(1); setPeriodStart(toDateStr(d)); setPeriodEnd(toDateStr(new Date())); }},
    {label:"全部期間",  fn:()=>{ const dates=transactions.map(t=>t.date).filter(Boolean).sort(); if(dates.length){ setPeriodStart(dates[0].slice(0,7)+"-01"); setPeriodEnd(toDateStr(new Date())); } }},
  ];

  return (
    <div>
      <div className="mode-toggle" style={{marginBottom:8}}>
        <button className={view==="networth"?"active":""} onClick={()=>setView("networth")}>淨資產趨勢</button>
        <button className={view==="cashflow"?"active":""} onClick={()=>setView("cashflow")}>收支趨勢</button>
      </div>

      {view==="networth" &&
        <React.Fragment>
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            {["month","year","period"].map(m=>(
              <button key={m} onClick={()=>{ setNwMode(m); if(m==="period") setShowPeriodSheet(true); }}
                style={{flex:1,padding:"7px 0",borderRadius:10,border:"1px solid var(--line)",

function AccountDetailSheet({acc, transactions, categories, accounts, onViewTx, onClose}){
  const [yearFilter, setYearFilter] = useState("all");

  const acctTx = useMemo(()=>{
    return transactions.filter(t=>
      t.type==="transfer" ? (t.fromAccountId===acc.id || t.toAccountId===acc.id) : t.accountId===acc.id
    );
  }, [transactions, acc.id]);

  const years = useMemo(()=>{
    const set = new Set(acctTx.map(t=>t.date.slice(0,4)));
    return Array.from(set).sort((a,b)=>b.localeCompare(a));
  }, [acctTx]);

  const filteredTx = useMemo(()=>{
    if(yearFilter==="all") return acctTx;
    return acctTx.filter(t=>t.date.slice(0,4)===yearFilter);
  }, [acctTx, yearFilter]);

  const totalIncome = filteredTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalExpense = filteredTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const totalTransferIn = filteredTx.filter(t=>t.type==="transfer" && t.toAccountId===acc.id).reduce((s,t)=>s+t.amount,0);
  const totalTransferOut = filteredTx.filter(t=>t.type==="transfer" && t.fromAccountId===acc.id).reduce((s,t)=>s+t.amount,0);
  const currentBalance = accountBalance(acc, transactions);

  const byCat = {};
  filteredTx.filter(t=>t.type==="expense").forEach(t=>{
    byCat[t.categoryId] = (byCat[t.categoryId]||0) + t.amount;
  });
  const catEntries = Object.entries(byCat).map(([id,val])=>{
    const cat = catById(categories, id);
    return {id, value:val, name: cat?cat.name:"未分類", color: cat?cat.color:"#ccc"};
  }).sort((a,b)=>b.value-a.value);
  const donutData = catEntries.length>6 ?
    [...catEntries.slice(0,6), {id:"_rest", value:catEntries.slice(6).reduce((s,e)=>s+e.value,0), name:"其他", color:"#B8AFA2"}]
    : catEntries;

  const dayGroups = groupByDate(filteredTx);

  return (
    <div className="sheet-overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="detail-header">
          <h2 className="detail-title">{acc.icon} {acc.name}</h2>
          <button className="detail-close-x" onClick={onClose}>✕</button>
        </div>

        <div className="acc-detail-balance">
          <div className="nw-label">目前餘額</div>
          <div className="nw-value">{fmtMoney(currentBalance)}</div>
          {acc.type==="fixed" && acc.rate &&
            <div className="acc-sub">利率 {acc.rate}%・{acc.startDate} ~ {acc.endDate}</div>
          }
        </div>

        <div className="acc-detail-stats">
          <div className="stat"><span>總收入</span><b className="pos">{fmtMoney(totalIncome)}</b></div>
          <div className="stat"><span>總支出</span><b className="neg">{fmtMoney(totalExpense)}</b></div>
          <div className="stat"><span>總轉入</span><b>{fmtMoney(totalTransferIn)}</b></div>
          <div className="stat"><span>總轉出</span><b>{fmtMoney(totalTransferOut)}</b></div>
        </div>

        {years.length>0 &&
          <div className="acc-detail-year-row">
            <select value={yearFilter} onChange={e=>setYearFilter(e.target.value)}>
              <option value="all">全部時間</option>
              {years.map(y=><option key={y} value={y}>{y}年</option>)}
            </select>
          </div>
        }

        {donutData.length>0 &&
          <div className="chart-card">
            <h3>支出分類佔比</h3>
            <div className="donut-wrap">
              <Donut data={donutData} />
              <div className="donut-legend">
                {donutData.map(d=>(
                  <div className="legend-row" key={d.id}>
                    <span className="legend-dot" style={{background:d.color}}></span>
                    <span className="name">{d.name}</span>
                    <span className="val">{fmtMoney(d.value)}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        }

        <div className="section-title">交易明細</div>
        {dayGroups.length===0 && <div className="empty-hint">這段時間沒有相關交易</div>}
        {dayGroups.map(g=>
          <React.Fragment key={g.date}>
            <div className="day-group-header">{formatDayLabel(g.date)}</div>
            {g.items.map(t=>
              <TxRow key={t.id} t={t} categories={categories} accounts={accounts} onClick={()=>onViewTx(t)} />
            )}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function InvestmentsSection({investments, onAddInvestment, onEditInvestment, onDeleteInvestment}){
  const [modal, setModal] = useState(null);
  const [priceModal, setPriceModal] = useState(null);
  const [syncAll, setSyncAll] = useState(false);
  const [syncMsg, setSyncMsg] = useState(null); // {text, err}

  function handleDelete(inv){
    if(!confirm("確定刪除「"+inv.name+"」整檔持股（含所有買進紀錄）？")) return;
    onDeleteInvestment(inv.id);
  }

  /* 單檔更新（卡片上的循環箭頭） */
  async function syncOne(inv){
    setSyncMsg(null);
    try{
      const r = await autoUpdatePrices([inv], onEditInvestment, false);
      if(r.missing.length){
        setSyncMsg({text:"查無代號 "+r.missing.join("、")+"，請確認代號或手動輸入", err:true});
      }else{
        setSyncMsg({text:"已更新（來源："+r.src+"）", err:false});
      }
    }catch(err){
      setSyncMsg({text:"更新失敗："+err.message+"（可手動輸入市價）", err:true});
    }
  }

  /* 全部更新：只打一次 API */
  async function syncEverything(){
    setSyncAll(true); setSyncMsg(null);
    try{
      const r = await autoUpdatePrices(investments, onEditInvestment, true);
      let t = "已更新 "+r.updated.length+" 檔";
      t += r.date ? "（"+r.date.slice(5)+" 收盤．來源："+r.src+"）" : "（來源："+r.src+"）";
      if(r.missing.length) t += "；查無 "+r.missing.join("、")+"（請手動輸入）";
      setSyncMsg({text:t, err:r.missing.length>0});
    }catch(err){
      setSyncMsg({text:"更新失敗（可手動輸入市價）", err:true, details:err.details});
    }finally{ setSyncAll(false); }
  }

  const totalValue = investments.reduce((s,i)=>s+invMarketValue(i),0);
  const totalCost = investments.reduce((s,i)=>s+invCostBasis(i),0);
  const totalDiv = investments.reduce((s,i)=>s+invTotalDividends(i),0);
  const totalGain = totalValue - totalCost + totalDiv;
  const totalPct = totalCost>0 ? (totalGain/totalCost*100) : 0;
  const gCls = totalGain>=0 ? "tw-up" : "tw-down";
  const sign = totalGain>=0 ? "+" : "";

  return (
    <div>
      {investments.length>0 &&
        <div className="inv-summary">
          <div className="is-hero">
            <div className="h-lbl">總損益（含息）</div>
            <div className={"h-amt "+gCls}>{sign}{fmtMoney(totalGain)}</div>
            <div className={"h-pct "+gCls}>{sign}{totalPct.toFixed(2)}%</div>
          </div>
          <div className="row"><span className="lbl">總現值</span><span className="val">{fmtMoney(totalValue)}</span></div>
          <div className="row"><span className="lbl">總成本</span><span className="val">{fmtMoney(totalCost)}</span></div>
          <div className="row"><span className="lbl">總配息（實拿）</span><span className="val">{fmtMoney(totalDiv)}</span></div>
        </div>
      }
      {investments.length>0 &&
        <div className="price-sync-bar">
          <button disabled={syncAll} onClick={syncEverything}>
            <i className={"ph ph-arrows-clockwise"+(syncAll?" spin":"")}></i>
            {syncAll?"更新中…":"更新股價"}
          </button>
          {syncMsg &&
            <span className={"sync-msg"+(syncMsg.err?" err":"")}>
              {syncMsg.text}
              {syncMsg.details &&
                <span style={{display:"block",marginTop:4,fontSize:11,opacity:.85,color:"var(--ink-soft)"}}>
                  {syncMsg.details.map((d,i)=><span key={i} style={{display:"block"}}>· {d}</span>)}
                </span>}
            </span>}
        </div>
      }
      <div className="acc-section">
        <div className="acc-section-title">
          <h3>📈 持股</h3>
          <button onClick={()=>setModal({type:"add"})}>＋ 新增持股</button>
        </div>
        {investments.length===0 && <div className="empty-hint">還沒有任何持股，先加一檔 0050 或 2330 試試</div>}
        {investments.slice().sort((a,b)=>String(a.symbol).localeCompare(String(b.symbol))).map(inv=>
          <InvestmentRow key={inv.id} inv={inv}
            onEdit={(i)=>setModal({type:"edit", initial:i})}
            onAddLot={(i)=>setModal({type:"edit", initial:i, addLot:true})}
            onUpdatePrice={(i)=>setPriceModal(i)}
            onSyncPrice={syncOne}
            onDelete={handleDelete} />
        )}
      </div>
      {modal &&
        <InvestmentModal initial={modal.initial} addLot={modal.addLot}
          onClose={()=>setModal(null)}
          onSave={(data)=>{
            if(modal.initial) onEditInvestment(modal.initial.id, data);
            else onAddInvestment(data);
            setModal(null);
          }} />
      }
      {priceModal &&
        <PriceModal inv={priceModal}
          onClose={()=>setPriceModal(null)}
          onSave={(data)=>{ onEditInvestment(priceModal.id, data); setPriceModal(null); }} />
      }
    </div>
  );
}

const PRIORITY_LABELS = {high:"高", mid:"中", low:"低"};

  const [priority, setPriority] = useState((initial&&initial.priority)||"mid");
  const [note, setNote] = useState((initial&&initial.note)||"");
  const [url, setUrl] = useState((initial&&initial.url)||"");

  function submit(){
    if(!name.trim()){ alert("請輸入品項名稱"); return; }
    onSave({name:name.trim(), price:parseFloat(price)||0, priority, note, url,
      purchased:initial?initial.purchased:false});
  }

  return (
    <div className="sheet-overlay" onClick={onClose}>

                  borderColor:priority===p?"currentColor":"transparent"}}>
                {PRIORITY_LABELS[p]}

          {w.priority && w.priority!=="mid" &&
            <span className={"wish-priority "+w.priority}>{PRIORITY_LABELS[w.priority]}</span>

            <div className="name strike">{w.name}</div>
          </div>

        </div>

      <button className="btn primary" style={{width:"100%",marginTop:8}}
        onClick={()=>setModal({initial:null})}>＋ 新增品項</button>

      {modal &&
        <WishlistModal initial={modal.initial}

            if(modal.initial) await onEdit(modal.initial.id, data);
            else await onAdd(data);

          }} />

      {modal && modal.initial &&

          onClick={async()=>{ if(confirm("確定刪除？")) { await onDelete(modal.initial.id); setModal(null); } }}>
          刪除此品項
        </button>
      }
      {buyItem &&
        <AddTxModal

          initial={{
            type:"expense",
            amount:buyItem.price||0,
            note:buyItem.name,
            date:toDateStr(new Date()),
          }}
          onSave={async(data)=>{
            await onSaveTx(data);
            await onDelete(buyItem.id);
            setBuyItem(null);
          }}
          onDelete={()=>{}}
          onClose={()=>setBuyItem(null)} />
      }
    </div>
  );
}

      </div>
    </div>
  );
}

function SubscriptionsSection({subscriptions, categories, accounts, transactions, onAdd, onEdit, onDelete}){
  const [modal, setModal] = useState(null);

  function nextBillingDate(sub){
    const today = toDateStr(new Date());
    const start = fromDateStr(sub.startDate);
    if(sub.cycle==="monthly"){
      let i=0; while(i<600){
        const d = addMonthsClamped(start,i);
        if(toDateStr(d)>=today) return toDateStr(d);
        i++;
      }
    } else if(sub.cycle==="yearly"){
      let i=0; while(i<50){
        const d=new Date(start.getFullYear()+i,start.getMonth(),start.getDate());
        if(toDateStr(d)>=today) return toDateStr(d);
        i++;
      }
    } else if(sub.cycle==="weekly"){
      const ms=7*24*3600*1000;
      let d=new Date(start);
      while(toDateStr(d)<today) d=new Date(d.getTime()+ms);
      return toDateStr(d);
    } else if(sub.cycle==="quarterly"){
      let i=0; while(i<200){
        const d=addMonthsClamped(start,i*3);
        if(toDateStr(d)>=today) return toDateStr(d);
        i++;
      }
    }
    return sub.startDate;
  }

  const activeSubs = subscriptions.filter(s=>s.active!==false);
  const pausedCount = subscriptions.filter(s=>s.active===false).length;
  const monthlyTotal = activeSubs.reduce((sum,s)=>{
    const a = s.amount||0;
    if(s.cycle==="monthly") return sum+a;
    if(s.cycle==="yearly") return sum+a/12;
    if(s.cycle==="weekly") return sum+a*52/12;
    if(s.cycle==="quarterly") return sum+a/3;
    return sum;
  }, 0);
  const yearlyTotal = activeSubs.reduce((sum,s)=>{
    const a = s.amount||0;
    if(s.cycle==="monthly") return sum+a*12;
    if(s.cycle==="yearly") return sum+a;
    if(s.cycle==="weekly") return sum+a*52;
    if(s.cycle==="quarterly") return sum+a*4;
    return sum;
  }, 0);

  return (
    <div>
      {subscriptions.length>0 &&
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <div style={{flex:1,background:"var(--surface)",borderRadius:12,padding:"12px 14px"}}>
            <div style={{fontSize:12,color:"var(--ink-soft)",marginBottom:4}}>每月平均{pausedCount>0&&<span style={{marginLeft:4,fontSize:11}}>（{pausedCount}項暫停中）</span>}</div>
            <div style={{fontSize:16,fontWeight:700,color:"var(--expense)"}}>{fmtMoney(Math.round(monthlyTotal))}</div>
          </div>
          <div style={{flex:1,background:"var(--surface)",borderRadius:12,padding:"12px 14px"}}>
            <div style={{fontSize:12,color:"var(--ink-soft)",marginBottom:4}}>每年預期</div>
            <div style={{fontSize:16,fontWeight:700,color:"var(--expense)"}}>{fmtMoney(Math.round(yearlyTotal))}</div>
          </div>
        </div>
      }
      {subscriptions.length===0 && <div className="empty-hint">還沒有訂閱項目</div>}
      {subscriptions.map(sub=>{
        const isPaused = sub.active===false;
        const next = !isPaused ? nextBillingDate(sub) : null;
        return (
          <div className="sub-row" key={sub.id} style={{opacity:isPaused?0.55:1,cursor:"pointer"}}
            onClick={()=>setModal({initial:sub})}>
            <div className="sub-icon">
              {sub.iconImage ? <img src={sub.iconImage} alt="" /> : <span style={{fontSize:22}}>{sub.icon||"📦"}</span>}
            </div>
            <div className="sub-info">
              <div className="name">
                {sub.name}
                {isPaused && <span style={{fontSize:11,color:"var(--ink-soft)",background:"var(--field-bg)",
                  borderRadius:6,padding:"1px 6px",marginLeft:6}}>暫停中</span>}
              </div>
              <div className="meta">
                {isPaused ? "已暫停" : "下次扣款："+next}
                {" · "}<span className="sub-cycle-badge">{CYCLE_LABELS[sub.cycle]||sub.cycle}</span>
              </div>
            </div>
            <div className="sub-amount">{fmtMoney(sub.amount)}</div>
          </div>
        );
      })}
      <button className="btn primary" style={{width:"100%",marginTop:8}}
        onClick={()=>setModal({initial:null})}>＋ 新增訂閱</button>
      {modal &&
        <SubscriptionModal initial={modal.initial} categories={categories} accounts={accounts}
          onClose={()=>setModal(null)}
          onDelete={modal.initial ? async(id)=>{ await onDelete(id); setModal(null); } : null}
          onSave={async data=>{
            if(modal.initial){ await onEdit(modal.initial.id, data); }
            else { await onAdd(data); }
            setModal(null);
          }} />
      }
    </div>
  );
}

/* ---------- App ---------- */
function App(){

  const [accounts, setAccounts] = useState([]);

  const [wishlists, setWishlists] = useState([]);
  const [tab, setTab] = useState("home");
  const [homeMode, setHomeMode] = useState("list");
  const [cursorMonth, setCursorMonth] = useState(()=>{const d=new Date(); d.setDate(1); return d;});
  const [homeRangeMode, setHomeRangeMode] = useState("month");
  const [homeRangeStart, setHomeRangeStart] = useState(()=>{const d=new Date(); d.setDate(1); return toDateStr(d);});
  const [homeRangeEnd, setHomeRangeEnd] = useState(()=>toDateStr(new Date()));
  const [showMonthPicker, setShowMonthPicker] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [showActionMenu, setShowActionMenu] = useState(false);
  const [addKind, setAddKind] = useState("txn");
  const [editingTx, setEditingTx] = useState(null);
  const [viewingTx, setViewingTx] = useState(null);
  const [presetDate, setPresetDate] = useState(null);
  const [presetType, setPresetType] = useState(null);
  const [msg, setMsg] = useState(null);
  const [darkMode, setDarkMode] = useState(()=>{
    try{
      const saved = localStorage.getItem("theme");
      if(saved) return saved==="dark";
      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    }catch(e){ return false; }
  });
  const seeded = useRef(false);
  const seededAcc = useRef(false);

  useEffect(()=>{
    document.documentElement.classList.toggle("dark", darkMode);
    try{ localStorage.setItem("theme", darkMode?"dark":"light"); }catch(e){}
  }, [darkMode]);

  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"categories"), snap=>{
      const list = snap.docs.map(d=>({id:d.id, ...d.data()}));
      setCategories(list);
      if(list.length===0 && !seeded.current){
        seeded.current = true;
        seedDefaultCategories();
      }
    });
    return unsub;
  }, []);

  useEffect(()=>{
    const unsub = onSnapshot(query(collection(db,"transactions"), orderBy("date","desc")), snap=>{
      setTransactions(snap.docs.map(d=>({id:d.id, ...d.data()})));
    });
    return unsub;
  }, []);

  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"budgets"), snap=>{
      setBudgets(snap.docs.map(d=>({id:d.id, ...d.data()})));
    });
    return unsub;
  }, []);

  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"accounts"), snap=>{
      const list = snap.docs.map(d=>({id:d.id, ...d.data()}));
      setAccounts(list);
      if(list.length===0 && !seededAcc.current){
        seededAcc.current = true;
        seedDefaultAccount();
      }
    });
    return unsub;
  }, []);

  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"investments"), snap=>{
      setInvestments(snap.docs.map(d=>({id:d.id, ...d.data()})));
    });
    return unsub;
  }, []);

  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"subscriptions"), snap=>{
      setSubscriptions(snap.docs.map(d=>({id:d.id, ...d.data()})));
    });
    return unsub;
  }, []);

  useEffect(()=>{
    const unsub = onSnapshot(collection(db,"wishlists"), snap=>{
      setWishlists(snap.docs.map(d=>({id:d.id, ...d.data()})));
    });
    return unsub;
  }, []);

  function subBillingDates(sub, today){
    // 從 startDate 往後算，到今天為止所有到期的扣款日
    const start = fromDateStr(sub.startDate);
    const dates = [];
    if(sub.cycle==="monthly"){
      let i=0;
      while(i<600){
        const d = addMonthsClamped(start, i);
        if(d>today) break;
        if(d>=start) dates.push(toDateStr(d));
        i++;
      }
    } else if(sub.cycle==="yearly"){
      let i=0;
      while(i<50){
        const d = new Date(start.getFullYear()+i, start.getMonth(), start.getDate());
        if(d>today) break;
        if(d>=start) dates.push(toDateStr(d));
        i++;
      }
    } else if(sub.cycle==="weekly"){
      const ms = 7*24*3600*1000;
      let d = new Date(start);
      while(d<=today){
        dates.push(toDateStr(d));
        d = new Date(d.getTime()+ms);
      }
    }
    return dates;
  }

  const generatingSubRef = useRef(false);
  async function generateDueSubscriptions(){
    if(generatingSubRef.current) return;
    const activeSubs = subscriptions.filter(s=>s.active!==false && s.startDate && s.amount>0);
    if(activeSubs.length===0) return;
    generatingSubRef.current = true;
    try{
      const today = new Date();
      // 確保有「訂閱」分類
      let subCat = categories.find(c=>c.type==="expense" && c.name==="訂閱" && !c.parentId);
      let subCatId = subCat ? subCat.id : null;
      if(!subCatId){
        const siblings = categories.filter(c=>c.type==="expense" && !c.parentId);
        const maxOrder = siblings.reduce((m,c)=>Math.max(m,c.order||0),-1);
        const ref = await addDoc(collection(db,"categories"),{
          name:"訂閱", type:"expense", icon:"ph-calendar-check", parentId:null,
          color:PARENT_COLORS[siblings.length%PARENT_COLORS.length], order:maxOrder+1,
        });
        subCatId = ref.id;
      }
      const batch = writeBatch(db);
      let any = false;
      activeSubs.forEach(sub=>{
        subBillingDates(sub, today).forEach(ds=>{
          const exists = transactions.some(t=>t.autoSubscription===sub.id && t.date===ds);
          if(!exists){
            const ref = doc(collection(db,"transactions"));
            batch.set(ref,{
              type:"expense", amount:sub.amount,
              categoryId: sub.categoryId||subCatId,
              accountId: sub.accountId||null,
              date:ds, note:sub.name+" 訂閱扣款",
              autoSubscription:sub.id, createdAt:Date.now(),
            });
            any = true;
          }
        });
      });
      if(any) await batch.commit();
    }finally{ generatingSubRef.current = false; }
  }
  useEffect(()=>{ generateDueSubscriptions(); }, [subscriptions, transactions, categories]);
  const generatingInterestRef = useRef(false);
  async function generateDueInterest(){
    if(generatingInterestRef.current) return;
    const fixedAccounts = accounts.filter(a=>a.type==="fixed" && a.rate && a.startDate && a.endDate);
    if(fixedAccounts.length===0) return;
    generatingInterestRef.current = true;
    try{
      const today = new Date();
      let interestCat = categories.find(c=>c.type==="income" && c.name==="利息" && !c.parentId);
      let interestCatId = interestCat ? interestCat.id : null;
      if(!interestCatId){
        const siblings = categories.filter(c=>c.type==="income" && !c.parentId);
        const maxOrder = siblings.reduce((m,c)=>Math.max(m, c.order||0), -1);
        const ref = await addDoc(collection(db,"categories"), {
          name:"利息", type:"income", icon:"💹", parentId:null,
          color:PALETTE[siblings.length%PALETTE.length], order:maxOrder+1,
        });
        interestCatId = ref.id;
      }
      const batch = writeBatch(db);
      let any = false;
      fixedAccounts.forEach(acc=>{
        const monthly = monthlyInterest(acc);
        const targetAccountId = acc.interestAccountId || acc.id;
        dueInterestDates(acc, today).forEach(ds=>{
          const exists = transactions.some(t=>t.autoInterest && t.accountId===targetAccountId && t.date===ds && t.note===(acc.name+" 利息"));
          if(!exists){
            const ref = doc(collection(db,"transactions"));
            batch.set(ref, {
              type:"income", amount:Math.round(monthly), categoryId:interestCatId,
              accountId:targetAccountId,
              date:ds, note:acc.name+" 利息", autoInterest:true, createdAt:Date.now(),
            });
            any = true;
          }
        });
      });
      if(any) await batch.commit();
    }finally{
      generatingInterestRef.current = false;
    }
  }
  useEffect(()=>{ generateDueInterest(); }, [accounts, transactions, categories]);

  function flash(text){ setMsg(text); setTimeout(()=>setMsg(null), 1600); }

  function prevMonth(){ setCursorMonth(d=>{const nd=new Date(d); nd.setMonth(nd.getMonth()-1); return nd;}); }
  function nextMonth(){ setCursorMonth(d=>{const nd=new Date(d); nd.setMonth(nd.getMonth()+1); return nd;}); }
  function jumpToMonth(y, m){ setCursorMonth(new Date(y, m-1, 1)); }

  const monthTx = useMemo(()=>{
    const key = monthKey(cursorMonth);
    return transactions.filter(t=>t.date && t.date.slice(0,7)===key);
  }, [transactions, cursorMonth]);

  const rangeTx = useMemo(()=>{
    if(homeRangeMode!=="custom") return monthTx;
    if(homeRangeEnd < homeRangeStart) return [];
    return transactions.filter(t=>t.date && t.date>=homeRangeStart && t.date<=homeRangeEnd);
  }, [transactions, homeRangeMode, homeRangeStart, homeRangeEnd, monthTx]);

  function openEditTx(t){
    setEditingTx(t);
    setAddKind(t.type==="transfer" ? "transfer" : "txn");
    setShowAdd(true);
  }
  function openViewTx(t){
    setViewingTx(t);
  }
  function closeAddModals(){
    setShowAdd(false); setEditingTx(null); setPresetDate(null); setPresetType(null); setAddKind("txn");
  }
  async function saveTx(data){
    try{
      if(editingTx) await updateDoc(doc(db,"transactions",editingTx.id), data);
      else await addDoc(collection(db,"transactions"), {...data, createdAt:Date.now()});
      closeAddModals();
      flash("已儲存");
    }catch(e){ alert("儲存失敗："+e.message); }
  }
  async function deleteTx(id){
    if(!confirm("確定刪除這筆交易？")) return;
    await deleteDoc(doc(db,"transactions",id));
    closeAddModals();
    flash("已刪除");
  }
  async function addCategory(data){
    const siblings = categories.filter(c=>c.type===data.type && (c.parentId||null)===(data.parentId||null));
    const maxOrder = siblings.reduce((m,c)=>Math.max(m, c.order||0), -1);
    let color = data.color;
    if(!data.parentId){
      // 大分類：從 PARENT_COLORS 取一個還沒被用的
      const parentSibs = categories.filter(c=>c.type===data.type && !c.parentId);
      color = assignParentColor(parentSibs);
    } else {
      // 子分類：從父分類色相衍生
      const parent = categories.find(c=>c.id===data.parentId);
      if(parent && parent.color){
        const allChildren = categories.filter(c=>c.parentId===data.parentId);
        color = childShade(parent.color, allChildren.length, allChildren.length+1);
      }
    }
    await addDoc(collection(db,"categories"), {...data, color, order:maxOrder+1});
  }
  async function reorderCategoryGroup(newList){
    const batch = writeBatch(db);
    newList.forEach((c,i)=>{ batch.update(doc(db,"categories",c.id), {order:i}); });
    await batch.commit();
  }
  async function editCategory(id, data){ await updateDoc(doc(db,"categories",id), data); }
  async function recolorAll(){
    try{
      const batch = writeBatch(db);
      ["expense","income"].forEach(type=>{
        const roots = categories.filter(c=>c.type===type && !c.parentId)
          .sort((a,b)=>(a.order||0)-(b.order||0));
        roots.forEach((root, ri)=>{
          const parentColor = PARENT_COLORS[ri % PARENT_COLORS.length];
          batch.update(doc(db,"categories",root.id), {color: parentColor});
          const children = categories.filter(c=>c.parentId===root.id)
            .sort((a,b)=>(a.order||0)-(b.order||0));
          const total = children.length;
          children.forEach((child, ci)=>{
            batch.update(doc(db,"categories",child.id), {color: childShade(parentColor, ci, total)});
          });
        });
      });
      await batch.commit();
      flash("配色已更新");
    }catch(e){ alert("更新失敗："+e.message); }
  }
  async function deleteCategory(id){
    await deleteDoc(doc(db,"categories",id));
    const b = budgets.find(b=>b.categoryId===id);
    if(b) await deleteDoc(doc(db,"budgets",b.id));
  }
  async function setBudget(categoryId, limit){
    const existing = budgets.find(b=>b.categoryId===categoryId);
    if(limit===null){
      if(existing) await deleteDoc(doc(db,"budgets",existing.id));
      return;
    }
    if(existing) await updateDoc(doc(db,"budgets",existing.id), {monthlyLimit:limit});
    else await addDoc(collection(db,"budgets"), {categoryId, monthlyLimit:limit});
  }

  async function addAccount(data){
    const sameType = accounts.filter(a=>a.type===data.type);
    const maxOrder = sameType.reduce((m,a)=>Math.max(m, a.order||0), -1);
    await addDoc(collection(db,"accounts"), {...data, order:maxOrder+1});
  }
  async function editAccount(id, data){ await updateDoc(doc(db,"accounts",id), data); }
  async function deleteAccount(id){ await deleteDoc(doc(db,"accounts",id)); }
  async function reorderAccountGroup(newList){
    const batch = writeBatch(db);
    newList.forEach((acc, i)=>{ batch.update(doc(db,"accounts",acc.id), {order:i}); });
    await batch.commit();
  }

  async function addInvestment(data){ await addDoc(collection(db,"investments"), data); }
  async function editInvestment(id, data){ await updateDoc(doc(db,"investments",id), data); }
  async function deleteInvestment(id){ await deleteDoc(doc(db,"investments",id)); }
  async function addSubscription(data){ await addDoc(collection(db,"subscriptions"), data); }
  async function editSubscription(id, data){ await updateDoc(doc(db,"subscriptions",id), data); }
  async function deleteSubscription(id){ await deleteDoc(doc(db,"subscriptions",id)); }
  async function addWishlist(data){ await addDoc(collection(db,"wishlists"), {...data, createdAt:Date.now()}); }
  async function editWishlist(id, data){ await updateDoc(doc(db,"wishlists",id), data); }
  async function deleteWishlist(id){ await deleteDoc(doc(db,"wishlists",id)); }

  const showMonthSwitcher = tab==="home" && (homeMode==="calendar" || homeRangeMode==="month");
  const showDateRangeRow = tab==="home" && homeMode==="list" && homeRangeMode==="custom";

  return (
    <div className="app">
      <div className="header">
        <h1>林間帳本 Grove</h1>
        <button className="theme-toggle" onClick={()=>setShowSettings(true)}>
          <i className="ph-duotone ph-gear"></i>
        </button>
      </div>
      {tab==="home" && homeMode==="list" &&
        <div className="range-mode-row">
          <button className="range-mode-link" onClick={()=>setHomeRangeMode(m=>m==="month"?"custom":"month")}>
            {homeRangeMode==="month" ? "改用自訂區間" : "改用選月份"}
          </button>
        </div>
      }
      {showMonthSwitcher &&
        <MonthSwitcher date={cursorMonth} onPrev={prevMonth} onNext={nextMonth} onJump={()=>setShowMonthPicker(true)} />
      }
      {showDateRangeRow &&
        <div className="date-range-row">
          <input type="date" value={homeRangeStart} onChange={e=>setHomeRangeStart(e.target.value)} />
          <span>～</span>
          <input type="date" value={homeRangeEnd} onChange={e=>setHomeRangeEnd(e.target.value)} />
        </div>
      }

      <div className="content">
        {tab==="home" &&
          <React.Fragment>
            <div className="mode-toggle">
              <button className={homeMode==="list"?"active":""} onClick={()=>setHomeMode("list")}>收支清冊</button>
              <button className={homeMode==="calendar"?"active":""} onClick={()=>setHomeMode("calendar")}>日曆</button>
            </div>
            {homeMode==="list" ?
              <OverviewTab categories={categories} accounts={accounts} monthTx={rangeTx} allTx={transactions}
                periodLabel={homeRangeMode==="custom"?"區間":"本月"}
                onViewTx={openViewTx} />
              :
              <CalendarTab categories={categories} accounts={accounts} monthTx={monthTx} cursorMonth={cursorMonth}
                onAddOnDate={(ds)=>{setPresetDate(ds); setPresetType(null); setEditingTx(null); setAddKind("txn"); setShowAdd(true);}}
                onViewTx={openViewTx} />
            }
          </React.Fragment>
        }
        {tab==="analysis" &&
          <AnalysisTab categories={categories} transactions={transactions} accounts={accounts} investments={investments} />
        }
        {tab==="settings" &&
          <SettingsTab categories={categories} accounts={accounts} transactions={transactions} investments={investments} subscriptions={subscriptions} onViewTx={openViewTx} onRecolorAll={recolorAll}
            onAddCategory={addCategory} onEditCategory={editCategory} onDeleteCategory={deleteCategory}
            onReorderCategoryGroup={reorderCategoryGroup}
            onAddAccount={addAccount} onEditAccount={editAccount} onDeleteAccount={deleteAccount}
            onReorderGroup={reorderAccountGroup}
            onAddInvestment={addInvestment} onEditInvestment={editInvestment} onDeleteInvestment={deleteInvestment}
            onAddSubscription={addSubscription} onEditSubscription={editSubscription} onDeleteSubscription={deleteSubscription}
            wishlists={wishlists} onAddWishlist={addWishlist} onEditWishlist={editWishlist} onDeleteWishlist={deleteWishlist}
            onAddTx={saveTx} />
        }
      </div>

      {tab==="home" &&
        <button className="fab" onClick={()=>{
          setEditingTx(null); setPresetDate(null); setPresetType(null); setShowActionMenu(true);
        }}>＋</button>
      }

      <BottomNav tab={tab} setTab={setTab} />

      {showMonthPicker &&
        <MonthPickerSheet year={cursorMonth.getFullYear()} month={cursorMonth.getMonth()+1}
          onPick={jumpToMonth}
          onClose={()=>setShowMonthPicker(false)} />
      }

      {showSettings &&
        <SettingsOverlay
          darkMode={darkMode} setDarkMode={setDarkMode}
          categories={categories} transactions={transactions}
          onAddCategory={addCategory} onEditCategory={editCategory}
          onDeleteCategory={deleteCategory} onReorderCategoryGroup={reorderCategoryGroup}
          onRecolorAll={recolorAll}
          onViewTx={openViewTx}
          onClose={()=>setShowSettings(false)} />
      }

      {viewingTx &&
        <TxDetailSheet t={viewingTx} categories={categories} accounts={accounts}
          onClose={()=>setViewingTx(null)}
          onEdit={()=>{ const t=viewingTx; setViewingTx(null); openEditTx(t); }} />
      }
      {showActionMenu &&
        <AddActionSheet
          onClose={()=>setShowActionMenu(false)}
          onPick={(kind)=>{
            setShowActionMenu(false);
            setEditingTx(null);
            if(kind==="transfer"){ setAddKind("transfer"); }
            else if(kind==="fixed"){ setAddKind("fixed"); }
            else { setAddKind("txn"); setPresetType(kind); }
            setShowAdd(true);
          }} />
      }
      {showAdd && addKind==="txn" &&
        <AddTxModal categories={categories} accounts={accounts} allTransactions={transactions}
          initial={editingTx ? editingTx : ((presetDate||presetType) ? {date:presetDate, type:presetType} : null)}
          onSave={saveTx} onDelete={deleteTx}
          onClose={closeAddModals} />
      }
      {showAdd && addKind==="transfer" &&
        <TransferModal accounts={accounts}
          initial={editingTx}
          onSave={saveTx} onDelete={deleteTx}
          onClose={closeAddModals} />
      }
      {showAdd && addKind==="fixed" &&
        <NewFixedDepositModal accounts={accounts}
          onClose={closeAddModals}
          onSave={async(data)=>{
            try{
              // 1. 建立定存帳戶
              const fixedAccounts = accounts.filter(a=>a.type==="fixed");
              const maxOrder = fixedAccounts.reduce((m,a)=>Math.max(m,a.order||0),-1);
              const accRef = await addDoc(collection(db,"accounts"),{
                name:data.name, type:"fixed", icon:"🔐", iconImage:null,
                initialBalance:0, rate:data.rate||null,
                startDate:data.startDate||null, endDate:data.endDate||null,
                interestAccountId:data.interestAccountId||null,
                order:maxOrder+1,
              });
              // 2. 記一筆轉帳（轉出帳戶 → 新定存帳戶）
              await addDoc(collection(db,"transactions"),{
                type:"transfer", amount:data.amount,
                fromAccountId:data.fromAccountId,
                toAccountId:accRef.id,
                categoryId:null, accountId:null,
                date:data.startDate||toDateStr(new Date()),
                note:data.name,
                createdAt:Date.now(),
              });
              closeAddModals();
              flash("定存帳戶已建立");
            }catch(e){ alert("建立失敗："+e.message); }
          }} />
      }
      {msg && <div className="top-msg">{msg}</div>}
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
