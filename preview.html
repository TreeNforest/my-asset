<!DOCTYPE html>

<meta charset="UTF-8" />
<script>
  window.addEventListener('error', function(e){
    showErrBox((e.error && (e.error.stack||e.error.message)) || e.message || String(e));
  });
  window.addEventListener('unhandledrejection', function(e){
    var r = e.reason;
    showErrBox('Promise rejection: ' + ((r && (r.stack||r.message)) || String(r)));
  });
  function showErrBox(text){
    var el = document.getElementById('err-box');
    if(!el){
      el = document.createElement('div');
      el.id = 'err-box';
      el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#B5615B;color:#fff;padding:14px;font-size:12px;z-index:99999;white-space:pre-wrap;max-height:70vh;overflow:auto;font-family:monospace;';
      document.body.appendChild(el);
    }
    var line = document.createElement('div');
    line.style.marginBottom = '10px';
    line.textContent = text;
    el.appendChild(line);
  }
</script>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>我的資產（預覽版）</title>
<style>
  :root{
    --bg:#F2EFEA;
    --surface:#FFFFFF;
    --ink:#3D3833;
    --ink-soft:#8C8579;
    --line:#E4DED4;
    --income:#8FA38E;

  .header{position:sticky;top:0;z-index:10;background:var(--bg);padding:18px 18px 8px;}

<script type="text/babel" data-presets="react" data-type="module">
import React,{useState,useEffect,useMemo,useRef} from "react";
import {createRoot} from "react-dom/client";

/* ========== preview.html：本地假資料版本，不連 Firebase ==========
   只用來在手機上快速預覽介面／流程，重新整理後資料會重置。
   正式資料請用 index.html（需先填入 Firebase config）。
================================================================= */

const PALETTE = ["#B98C82","#8FA38E","#C9B38B","#94A7B5","#A98C78","#B5949A","#7E9181","#C2A878","#9E8B99","#8FA8A0"];

const DEFAULT_CATEGORIES = [
  {name:"薪資", type:"income", icon:"💰"},
  {name:"獎金", type:"income", icon:"🎁"},
  {name:"投資", type:"income", icon:"📈"},
  {name:"其他收入", type:"income", icon:"➕"},
  {name:"飲食", type:"expense", icon:"🍙"},
  {name:"交通", type:"expense", icon:"🚌"},
  {name:"居住", type:"expense", icon:"🏠"},
  {name:"娛樂", type:"expense", icon:"🎮"},
  {name:"購物", type:"expense", icon:"🛍️"},
  {name:"醫療", type:"expense", icon:"💊"},
  {name:"學習", type:"expense", icon:"📚"},
  {name:"其他支出", type:"expense", icon:"🔖"},
];

function pad(n){return n<10?"0"+n:""+n;}
function toDateStr(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function fromDateStr(s){const p=s.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}
function monthKey(d){return d.getFullYear()+"-"+pad(d.getMonth()+1);}
function fmtMoney(n){return "NT$"+Math.round(n||0).toLocaleString("zh-Hant-TW");}
function fmtMonthLabel(d){return d.getFullYear()+"年"+(d.getMonth()+1)+"月";}
function daysInMonth(d){return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}

function buildTree(list){
  const map={};
  list.forEach(c=>map[c.id]={...c, children:[]});
  const roots=[];
  list.forEach(c=>{
    if(c.parentId && map[c.parentId]) map[c.parentId].children.push(map[c.id]);
    else roots.push(map[c.id]);
  });
  return roots;
}
function flattenForSelect(list, type){
  const roots=buildTree(list.filter(c=>c.type===type));
  const out=[];
  function walk(node, depth){
    out.push({id:node.id, label:"\u3000".repeat(depth)+(node.icon||"")+" "+node.name});
    node.children.forEach(ch=>walk(ch, depth+1));
  }
  roots.forEach(r=>walk(r,0));
  return out;
}
function catById(list, id){return list.find(c=>c.id===id);}

function makeFakeCategories(){
  return DEFAULT_CATEGORIES.map((c,i)=>({id:"cat_"+i, name:c.name, type:c.type, icon:c.icon, parentId:null, color:PALETTE[i%PALETTE.length]}));
}
function makeFakeTransactions(cats){
  const food = cats.find(c=>c.name==="飲食");
  const transit = cats.find(c=>c.name==="交通");
  const salary = cats.find(c=>c.name==="薪資");
  const shop = cats.find(c=>c.name==="購物");
  const today = new Date();
  const ym = today.getFullYear()+"-"+pad(today.getMonth()+1);
  return [
    {id:"tx1", type:"income", amount:42000, categoryId:salary.id, date:ym+"-05", note:"月薪"},
    {id:"tx2", type:"expense", amount:120, categoryId:food.id, date:ym+"-05", note:"早餐"},
    {id:"tx3", type:"expense", amount:30, categoryId:transit.id, date:ym+"-05", note:"捷運"},
    {id:"tx4", type:"expense", amount:850, categoryId:shop.id, date:ym+"-08", note:""},
    {id:"tx5", type:"expense", amount:260, categoryId:food.id, date:ym+"-10", note:"晚餐聚餐"},
  ];
}

/* ---------- 小元件 ---------- */
function MonthSwitcher({date, onPrev, onNext}){
  return (
    <div className="month-switcher">
      <button onClick={onPrev}>‹</button>
      <span className="label">{fmtMonthLabel(date)}</span>
      <button onClick={onNext}>›</button>
    </div>
  );
}
function YearSwitcher({year, onPrev, onNext}){
  return (
    <div className="year-switcher">
      <button onClick={onPrev}>‹</button>
      <span className="label">{year}年</span>
      <button onClick={onNext}>›</button>
    </div>
  );
}
function BarChart({data}){
  const max = Math.max(1, ...data.map(d=>Math.abs(d.value)));
  return (
    <div className="barchart">
      {data.map((d,i)=>(
        <div className="bar-col" key={i}>
          <div className="bar" style={{height:(Math.abs(d.value)/max*100)+"%", background: d.value>=0?"var(--income)":"var(--expense)"}}></div>
          <span className="bar-label">{d.label}</span>
        </div>
      ))}
    </div>
  );
}
function GroupedBarChart({months}){
  const max = Math.max(1, ...months.flatMap(m=>[m.income, m.expense]));
  return (
    <div className="barchart">
      {months.map((m,i)=>(
        <div className="bar-col" key={i}>
          <div className="grouped-bars">
            <div className="bar income" style={{height:(m.income/max*100)+"%"}}></div>
            <div className="bar expense" style={{height:(m.expense/max*100)+"%"}}></div>
          </div>
          <span className="bar-label">{m.label}</span>
        </div>
      ))}
    </div>
  );
}
function Donut({data, size}){
  size = size || 140;
  const thickness = 20;
  const total = data.reduce((s,d)=>s+d.value,0) || 1;
  const radius = (size-thickness)/2;
  const circumference = 2*Math.PI*radius;
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      <g transform={"translate("+size/2+","+size/2+") rotate(-90)"}>
        {data.map((d,i)=>{
          const frac = d.value/total;
          const dash = frac*circumference;
          const el = (
            <circle key={i} r={radius} fill="none" stroke={d.color} strokeWidth={thickness}
              strokeDasharray={dash+" "+(circumference-dash)} strokeDashoffset={-offset}></circle>
          );
          offset += dash;
          return el;
        })}
      </g>
      <text x="50%" y="50%" textAnchor="middle" dominantBaseline="middle" fontSize="12" fill="var(--ink)">支出</text>
    </svg>
  );
}

function BottomNav({tab, setTab}){
  const items=[
    {key:"overview", icon:"🏠", label:"總覽"},
    {key:"calendar", icon:"📅", label:"月曆"},
    {key:"analysis", icon:"📊", label:"分析"},
    {key:"settings", icon:"🗂", label:"分類"},
  ];
  return (
    <div className="bottom-nav">
      {items.map(it=>(
        <button key={it.key} className={tab===it.key?"active":""} onClick={()=>setTab(it.key)}>
          <span className="ic">{it.icon}</span>
          <span>{it.label}</span>
        </button>
      ))}
    </div>
  );
}

function AddTxModal({categories, initial, onSave, onDelete, onClose}){
  const [type, setType] = useState((initial&&initial.type)||"expense");
  const [amount, setAmount] = useState(initial?String(initial.amount):"");
  const [categoryId, setCategoryId] = useState((initial&&initial.categoryId)||"");
  const [date, setDate] = useState((initial&&initial.date)||toDateStr(new Date()));
  const [note, setNote] = useState((initial&&initial.note)||"");
  const options = useMemo(()=>flattenForSelect(categories, type), [categories, type]);

  useEffect(()=>{
    if(!options.find(o=>o.id===categoryId)) setCategoryId(options[0]?options[0].id:"");
  }, [type]);

  function submit(){
    const n = parseFloat(amount);
    if(!n || n<=0){ alert("請輸入金額"); return; }
    if(!categoryId){ alert("請選擇分類"); return; }
    onSave({type, amount:n, categoryId, date, note});
  }

  return (
    <div className="sheet-overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"></div>
        <h2>{initial?"編輯交易":"新增交易"}</h2>
        <div className="type-toggle">
          <button className={type==="expense"?"active expense":""} onClick={()=>setType("expense")}>支出</button>
          <button className={type==="income"?"active income":""} onClick={()=>setType("income")}>收入</button>
        </div>
        <div className="field">
          <label>金額</label>
          <input type="number" inputMode="decimal" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0" />
        </div>
        <div className="field">
          <label>分類</label>
          <select value={categoryId} onChange={e=>setCategoryId(e.target.value)}>
            {options.map(o=><option key={o.id} value={o.id}>{o.label}</option>)}
          </select>
        </div>
        <div className="field">
          <label>日期</label>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} />
        </div>
        <div className="field">
          <label>備註</label>
          <input type="text" value={note} onChange={e=>setNote(e.target.value)} placeholder="選填" />
        </div>
        <div className="btn-row">
          {initial && <button className="btn danger" onClick={()=>onDelete(initial.id)}>刪除</button>}
          <button className="btn ghost" onClick={onClose}>取消</button>
          <button className="btn primary" onClick={submit}>儲存</button>
        </div>
      </div>
    </div>
  );
}

function CategoryModal({initial, parentId, type, onSave, onClose}){
  const [name, setName] = useState((initial&&initial.name)||"");
  const [icon, setIcon] = useState((initial&&initial.icon)||"🔖");
  function submit(){
    if(!name.trim()){ alert("請輸入分類名稱"); return; }
    onSave({name:name.trim(), icon: icon||"🔖", type, parentId: parentId||null});
  }
  return (
    <div className="sheet-overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"></div>
        <h2>{initial?"編輯分類":"新增分類"}</h2>
        <div className="field">
          <label>名稱</label>
          <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="例如：咖啡" />
        </div>
        <div className="field">
          <label>圖示 (emoji)</label>
          <input type="text" value={icon} onChange={e=>setIcon(e.target.value)} placeholder="🔖" />
        </div>
        <div className="btn-row">
          <button className="btn ghost" onClick={onClose}>取消</button>
          <button className="btn primary" onClick={submit}>儲存</button>
        </div>
      </div>
    </div>
  );
}

function BudgetModal({category, current, onSave, onClose}){
  const [val, setVal] = useState(current?String(current):"");
  function submit(){
    const n = parseFloat(val);
    onSave(category.id, n>0?n:null);
  }
  return (
    <div className="sheet-overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"></div>
        <h2>{category.icon} {category.name} 的月預算</h2>
        <div className="field">
          <label>每月預算上限（NT$，留空＝不設定）</label>
          <input type="number" inputMode="decimal" value={val} onChange={e=>setVal(e.target.value)} placeholder="例如 3000" />
        </div>
        <div className="btn-row">
          <button className="btn ghost" onClick={onClose}>取消</button>
          <button className="btn primary" onClick={submit}>儲存</button>
        </div>
      </div>
    </div>
  );
}

/* ---------- 主分頁 ---------- */
function OverviewTab({categories, monthTx, budgets, onEditTx, onAdd}){
  const income = monthTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense = monthTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;

  const budgetRows = budgets.map(b=>{
    const cat = catById(categories, b.categoryId);
    if(!cat) return null;
    const spent = monthTx.filter(t=>t.type==="expense" && t.categoryId===b.categoryId).reduce((s,t)=>s+t.amount,0);
    return {cat, limit:b.monthlyLimit, spent};
  }).filter(Boolean);

  const recent = [...monthTx].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,15);

  return (
    <div>
      <div className="summary-cards">
        <div className="summary-card income"><div className="label">本月收入</div><div className="value">{fmtMoney(income)}</div></div>
        <div className="summary-card expense"><div className="label">本月支出</div><div className="value">{fmtMoney(expense)}</div></div>
        <div className="summary-card"><div className="label">本月結餘</div><div className="value">{fmtMoney(balance)}</div></div>
      </div>

      {budgetRows.length>0 &&
        <React.Fragment>
          <div className="section-title">預算進度</div>
          {budgetRows.map(r=>{
            const pct = Math.min(100, (r.spent/r.limit)*100);
            const over = r.spent > r.limit;
            const warnZone = !over && pct>=80;
            return (
              <div className="budget-row" key={r.cat.id}>
                <div className="top">
                  <span className="name">{r.cat.icon} {r.cat.name}</span>
                  <span className={"nums"+(over?" over":"")}>{fmtMoney(r.spent)} / {fmtMoney(r.limit)}</span>
                </div>
                <div className="budget-bar"><div className={"fill"+(over?" over":warnZone?" warn":"")} style={{width:pct+"%"}}></div></div>
              </div>
            );
          })}
        </React.Fragment>
      }

      <div className="section-title">本月交易</div>
      {recent.length===0 && <div className="empty-hint">這個月還沒有任何紀錄，點右下角「＋」新增一筆吧</div>}
      {recent.map(t=>{
        const cat = catById(categories, t.categoryId);
        return (
          <div className="tx-item" key={t.id} onClick={()=>onEditTx(t)}>
            <div className="icon" style={{background:(cat?cat.color:"#ccc")+"22"}}>{cat?cat.icon:"❓"}</div>
            <div className="mid">
              <div className="cat">{cat?cat.name:"未分類"}</div>
              {t.note && <div className="note">{t.note}</div>}
            </div>
            <div className={"amt "+t.type}>{t.type==="income"?"+":"−"}{fmtMoney(t.amount)}</div>
          </div>
        );
      })}
    </div>
  );
}

function CalendarTab({categories, monthTx, cursorMonth, onAddOnDate, onEditTx}){
  const [activeDay, setActiveDay] = useState(null);
  const dim = daysInMonth(cursorMonth);
  const firstDow = new Date(cursorMonth.getFullYear(), cursorMonth.getMonth(), 1).getDay();
  const todayStr = toDateStr(new Date());
  const cells = [];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(d);

  function txOnDay(d){
    const ds = cursorMonth.getFullYear()+"-"+pad(cursorMonth.getMonth()+1)+"-"+pad(d);
    return monthTx.filter(t=>t.date===ds);
  }

  const dayList = activeDay? txOnDay(activeDay) : [];
  const activeDs = activeDay? cursorMonth.getFullYear()+"-"+pad(cursorMonth.getMonth()+1)+"-"+pad(activeDay) : null;

  return (
    <div>
      <div className="calendar-grid">
        {["日","一","二","三","四","五","六"].map(w=><div className="cal-dow" key={w}>{w}</div>)}
        {cells.map((d,i)=>{
          if(d===null) return <div className="cal-cell empty" key={i}></div>;
          const ds = cursorMonth.getFullYear()+"-"+pad(cursorMonth.getMonth()+1)+"-"+pad(d);
          const dayTx = txOnDay(d);
          const hasIncome = dayTx.some(t=>t.type==="income");
          const hasExpense = dayTx.some(t=>t.type==="expense");
          return (
            <div key={i} className={"cal-cell"+(ds===todayStr?" today":"")} onClick={()=>setActiveDay(d)}>
              <span>{d}</span>
              {(hasIncome||hasExpense) &&
                <div className="cal-dots">
                  {hasIncome && <span className="cal-dot income"></span>}
                  {hasExpense && <span className="cal-dot expense"></span>}
                </div>
              }
            </div>
          );
        })}
      </div>

      {activeDay &&
        <div className="sheet-overlay" onClick={()=>setActiveDay(null)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"></div>
            <h2>{cursorMonth.getMonth()+1}月{activeDay}日</h2>
            {dayList.length===0 && <div className="empty-hint">這天還沒有紀錄</div>}
            {dayList.map(t=>{
              const cat = catById(categories, t.categoryId);
              return (
                <div className="tx-item" key={t.id} onClick={()=>{setActiveDay(null); onEditTx(t);}}>
                  <div className="icon" style={{background:(cat?cat.color:"#ccc")+"22"}}>{cat?cat.icon:"❓"}</div>
                  <div className="mid">
                    <div className="cat">{cat?cat.name:"未分類"}</div>
                    {t.note && <div className="note">{t.note}</div>}
                  </div>
                  <div className={"amt "+t.type}>{t.type==="income"?"+":"−"}{fmtMoney(t.amount)}</div>
                </div>
              );
            })}
            <div className="btn-row">
              <button className="btn ghost" onClick={()=>setActiveDay(null)}>關閉</button>
              <button className="btn primary" onClick={()=>{onAddOnDate(activeDs); setActiveDay(null);}}>＋ 在這天新增</button>
            </div>
          </div>
        </div>
      }
    </div>
  );
}

function AnalysisTab({categories, transactions, cursorMonth, cursorYear}){
  const [mode, setMode] = useState("month");

  const monthData = useMemo(()=>{
    const key = monthKey(cursorMonth);
    const tx = transactions.filter(t=>t.date.slice(0,7)===key);
    const dim = daysInMonth(cursorMonth);
    const daily = [];
    for(let d=1;d<=dim;d++){
      const ds = key+"-"+pad(d);
      const income = tx.filter(t=>t.type==="income"&&t.date===ds).reduce((s,t)=>s+t.amount,0);
      const expense = tx.filter(t=>t.type==="expense"&&t.date===ds).reduce((s,t)=>s+t.amount,0);
      daily.push({label:String(d), value: income-expense});
    }
    const byCat = {};
    tx.filter(t=>t.type==="expense").forEach(t=>{
      byCat[t.categoryId] = (byCat[t.categoryId]||0) + t.amount;
    });
    return {daily, byCat, tx};
  }, [transactions, cursorMonth]);

  const yearData = useMemo(()=>{
    const months = [];
    for(let m=0;m<12;m++){
      const key = cursorYear+"-"+pad(m+1);
      const tx = transactions.filter(t=>t.date.slice(0,7)===key);
      months.push({
        label:(m+1)+"月",
        income: tx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0),
        expense: tx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0),
      });
    }
    const byCat = {};
    transactions.filter(t=>t.type==="expense" && t.date.slice(0,4)===String(cursorYear)).forEach(t=>{
      byCat[t.categoryId] = (byCat[t.categoryId]||0) + t.amount;
    });
    return {months, byCat};
  }, [transactions, cursorYear]);

  function donutData(byCat){
    const entries = Object.entries(byCat).map(([id,val])=>{
      const cat = catById(categories, id);
      return {id, value:val, name: cat?cat.name:"未分類", color: cat?cat.color:"#ccc"};
    }).sort((a,b)=>b.value-a.value);
    if(entries.length>6){
      const top = entries.slice(0,6);
      const restVal = entries.slice(6).reduce((s,e)=>s+e.value,0);
      top.push({id:"_rest", value:restVal, name:"其他", color:"#B8AFA2"});
      return top;
    }
    return entries;
  }

  const data = mode==="month" ? donutData(monthData.byCat) : donutData(yearData.byCat);

  return (
    <div>
      <div className="mode-toggle">
        <button className={mode==="month"?"active":""} onClick={()=>setMode("month")}>本月</button>
        <button className={mode==="year"?"active":""} onClick={()=>setMode("year")}>本年</button>
      </div>

      {mode==="month" ?
        <div className="chart-card">
          <h3>每日收支淨額</h3>
          <BarChart data={monthData.daily} />
        </div>
        :
        <div className="chart-card">
          <h3>每月收支（淺色收入／深色支出）</h3>
          <GroupedBarChart months={yearData.months} />
        </div>
      }

      <div className="chart-card">
        <h3>{mode==="month"?"本月":"本年"}支出分類佔比</h3>
        {data.length===0 ? <div className="empty-hint">還沒有支出紀錄</div> :
          <div className="donut-wrap">
            <Donut data={data} />
            <div className="donut-legend">
              {data.map(d=>(
                <div className="legend-row" key={d.id}>
                  <span className="legend-dot" style={{background:d.color}}></span>
                  <span className="name">{d.name}</span>
                  <span className="val">{fmtMoney(d.value)}</span>
                </div>
              ))}
            </div>
          </div>
        }
      </div>
    </div>
  );
}

function CategoryNode({node, depth, budgets, onAddChild, onEdit, onDelete, onBudget}){
  const budget = budgets.find(b=>b.categoryId===node.id);
  return (
    <div className="cat-node">
      <div className="cat-row">
        <span className="dot" style={{background:node.color}}></span>
        <span className="name">{node.icon} {node.name}</span>
        {node.type==="expense" &&
          <span className="budget-tag" onClick={()=>onBudget(node)}>
            {budget?("預算 "+fmtMoney(budget.monthlyLimit)):"設預算"}
          </span>
        }
        <button className="icon-btn" onClick={()=>onAddChild(node)}>＋子</button>
        <button className="icon-btn" onClick={()=>onEdit(node)}>✏️</button>
        <button className="icon-btn" onClick={()=>onDelete(node)}>🗑</button>
      </div>
      {node.children.length>0 &&
        <div className="cat-children">
          {node.children.map(ch=>
            <CategoryNode key={ch.id} node={ch} depth={depth+1} budgets={budgets}
              onAddChild={onAddChild} onEdit={onEdit} onDelete={onDelete} onBudget={onBudget} />
          )}
        </div>
      }
    </div>
  );
}

function SettingsTab({categories, budgets, onAddCategory, onEditCategory, onDeleteCategory, onSetBudget}){
  const [catModal, setCatModal] = useState(null); // {mode:'add'|'edit', type, parentId, initial}
  const [budgetTarget, setBudgetTarget] = useState(null);

  const expenseTree = buildTree(categories.filter(c=>c.type==="expense"));
  const incomeTree = buildTree(categories.filter(c=>c.type==="income"));

  function handleDelete(node){
    if(node.children.length>0){ alert("請先刪除子分類"); return; }
    if(!confirm("確定刪除「"+node.name+"」？已使用此分類的交易仍會保留分類ID，但顯示會變成未分類。")) return;
    onDeleteCategory(node.id);
  }

  return (
    <div>
      <div className="cat-section">
        <div className="cat-section-title">
          <h3>支出分類</h3>
          <button onClick={()=>setCatModal({type:"expense", parentId:null})}>＋ 新增大分類</button>
        </div>
        {expenseTree.map(n=>
          <CategoryNode key={n.id} node={n} depth={0} budgets={budgets}
            onAddChild={(p)=>setCatModal({type:"expense", parentId:p.id})}
            onEdit={(c)=>setCatModal({type:"expense", parentId:c.parentId, initial:c})}
            onDelete={handleDelete}
            onBudget={(c)=>setBudgetTarget(c)} />
        )}
      </div>

      <div className="cat-section">
        <div className="cat-section-title">
          <h3>收入分類</h3>
          <button onClick={()=>setCatModal({type:"income", parentId:null})}>＋ 新增大分類</button>
        </div>
        {incomeTree.map(n=>
          <CategoryNode key={n.id} node={n} depth={0} budgets={budgets}
            onAddChild={(p)=>setCatModal({type:"income", parentId:p.id})}
            onEdit={(c)=>setCatModal({type:"income", parentId:c.parentId, initial:c})}
            onDelete={handleDelete}
            onBudget={()=>{}} />
        )}
      </div>

      {catModal &&
        <CategoryModal type={catModal.type} parentId={catModal.parentId} initial={catModal.initial}
          onClose={()=>setCatModal(null)}
          onSave={(data)=>{
            if(catModal.initial) onEditCategory(catModal.initial.id, data);
            else onAddCategory(data);
            setCatModal(null);
          }} />
      }
      {budgetTarget &&
        <BudgetModal category={budgetTarget}
          current={(budgets.find(b=>b.categoryId===budgetTarget.id)||{}).monthlyLimit}
          onClose={()=>setBudgetTarget(null)}
          onSave={(catId, limit)=>{ onSetBudget(catId, limit); setBudgetTarget(null); }} />
      }
    </div>
  );
}

/* ---------- App ---------- */
function App(){
  const [categories, setCategories] = useState([]);
  const [transactions, setTransactions] = useState([]);
  const [budgets, setBudgets] = useState([]);
  const [tab, setTab] = useState("overview");
  const [cursorMonth, setCursorMonth] = useState(()=>{const d=new Date(); d.setDate(1); return d;});
  const [cursorYear, setCursorYear] = useState(()=>new Date().getFullYear());
  const [showAdd, setShowAdd] = useState(false);
  const [editingTx, setEditingTx] = useState(null);
  const [presetDate, setPresetDate] = useState(null);
  const [msg, setMsg] = useState(null);
  const seeded = useRef(false);

  useEffect(()=>{
    if(seeded.current) return;
    seeded.current = true;
    const cats = makeFakeCategories();
    setCategories(cats);
    setTransactions(makeFakeTransactions(cats));
    setBudgets([{id:"b1", categoryId: cats.find(c=>c.name==="飲食").id, monthlyLimit:3000}]);
  }, []);

  function flash(text){ setMsg(text); setTimeout(()=>setMsg(null), 1600); }

  function prevMonth(){ setCursorMonth(d=>{const nd=new Date(d); nd.setMonth(nd.getMonth()-1); return nd;}); }
  function nextMonth(){ setCursorMonth(d=>{const nd=new Date(d); nd.setMonth(nd.getMonth()+1); return nd;}); }

  const monthTx = useMemo(()=>{
    const key = monthKey(cursorMonth);
    return transactions.filter(t=>t.date && t.date.slice(0,7)===key);
  }, [transactions, cursorMonth]);

  async function saveTx(data){
    if(editingTx) setTransactions(list=>list.map(t=>t.id===editingTx.id?{...t,...data}:t));
    else setTransactions(list=>[{id:uid(), ...data}, ...list]);
    setShowAdd(false); setEditingTx(null); setPresetDate(null);
    flash("已儲存");
  }
  async function deleteTx(id){
    if(!confirm("確定刪除這筆交易？")) return;
    setTransactions(list=>list.filter(t=>t.id!==id));
    setShowAdd(false); setEditingTx(null);
    flash("已刪除");
  }
  async function addCategory(data){ setCategories(list=>[...list, {id:uid(), ...data, color:PALETTE[list.length%PALETTE.length]}]); }
  async function editCategory(id, data){ setCategories(list=>list.map(c=>c.id===id?{...c,...data}:c)); }
  async function deleteCategory(id){
    setCategories(list=>list.filter(c=>c.id!==id));
    setBudgets(list=>list.filter(b=>b.categoryId!==id));
  }
  async function setBudget(categoryId, limit){
    setBudgets(list=>{
      const existing = list.find(b=>b.categoryId===categoryId);
      if(limit===null) return list.filter(b=>b.categoryId!==categoryId);
      if(existing) return list.map(b=>b.categoryId===categoryId?{...b,monthlyLimit:limit}:b);
      return [...list, {id:uid(), categoryId, monthlyLimit:limit}];
    });
  }

  const showMonthHeader = tab==="overview" || tab==="calendar";

  return (
    <div className="app">
      <div className="header"><h1>我的資產</h1></div>
      {showMonthHeader && <MonthSwitcher date={cursorMonth} onPrev={prevMonth} onNext={nextMonth} />}

      <div className="content">
        {tab==="overview" &&
          <OverviewTab categories={categories} monthTx={monthTx} budgets={budgets}
            onEditTx={(t)=>{setEditingTx(t); setShowAdd(true);}} />
        }
        {tab==="calendar" &&
          <CalendarTab categories={categories} monthTx={monthTx} cursorMonth={cursorMonth}
            onAddOnDate={(ds)=>{setPresetDate(ds); setEditingTx(null); setShowAdd(true);}}
            onEditTx={(t)=>{setEditingTx(t); setShowAdd(true);}} />
        }
        {tab==="analysis" &&
          <AnalysisTab categories={categories} transactions={transactions} cursorMonth={cursorMonth} cursorYear={cursorYear} />
        }
        {tab==="settings" &&
          <SettingsTab categories={categories} budgets={budgets}
            onAddCategory={addCategory} onEditCategory={editCategory} onDeleteCategory={deleteCategory}
            onSetBudget={setBudget} />
        }
      </div>

      {(tab==="overview"||tab==="calendar") &&
        <button className="fab" onClick={()=>{setEditingTx(null); setPresetDate(null); setShowAdd(true);}}>＋</button>
      }

      <BottomNav tab={tab} setTab={setTab} />

      {showAdd &&
        <AddTxModal categories={categories}
          initial={editingTx ? editingTx : (presetDate? {date:presetDate} : null)}
          onSave={saveTx} onDelete={deleteTx}
          onClose={()=>{setShowAdd(false); setEditingTx(null); setPresetDate(null);}} />
      }
      {msg && <div className="top-msg">{msg}</div>}
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
